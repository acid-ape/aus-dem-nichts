<style>

<script>
"use strict";
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const VS=0.66;  // Gesamt-Maßstab Dorf+Sprites zusammen relativ zur Welt (mid:6199/6201/6202): ganze Anlage UND Sprites mit DEMSELBEN Faktor → mehr Karte, interne Proportion exakt wie im guten Original (SC=1 / VILLAGE_R=280)
const WORLD=21000, BASE={x:WORLD/2,y:WORLD/2}, HARVEST_R=58, BASE_R=Math.round(96*VS), BASE_SOLID=Math.round(40*VS);  // deutlich größere runde Welt (mid:6171)
const SC=VS;  // Sprites skalieren 1:1 mit der Dorf-Anlage
const PR=13, WR=11;
/* ---------- Balance (zentral, leicht tunebar) ----------
   Ziel: aktives Sammeln bleibt lange der STÄRKSTE Weg; Auto/Idle ist langsamer Bonus
   (v.a. offline). Auto-Producer schwächer+teurer+erst ab Dorf-Era. */
const BAL={
  heroGatherBase:5.0, gatherPerLvl:2,   // Held aktiv: Basis-Rate + pro Werkzeug-Level
  workerEff:0.4,                          // Helfer sammeln mit 40% der Held-Rate (war 0.5)
  sawmillRate:0.3, quarryRate:0.2,        // pro Gebäude-Level/Sekunde (war 0.5 / 0.35)
  autoFromEra:1,                          // Sägewerk/Steinbruch erst ab Zeitalter 1 (Dorf)
};
// Produktionsgebäude: je 1 pro Zeitalter, steht in einem Kuchenstück. Arbeiter werden ihnen zugewiesen.
// Ökonomie-Redesign 2026-06-24 (§1/§3): 6 DORF-Gebäude. Sammel-Ressourcen sind jetzt ALLE Außenposten (s.u.).
// Freischalt-Reihenfolge (era=Stufe-1): Schmiede S4, Kaserne S5, Reparatur S7, Goldmine S11, Marktplatz S13, Heiler S16.
// Sprites interim: Reparatur=b_waffen + Heiler=b_juwelier (Design-final); Kaserne=b_waffen + Marktplatz=b_juwelier (P8 → neu generieren).
const BUILD_TYPES={
  schmiede:    {name:'Schmiede',   res:'gold', sprite:'b_schmiede', base:0.20, era:3, cost:{holz:160,stein:110}, consumes:{holz:1.4,stein:0.9}},   // P2 interim: behält Gold-Veredelung (Charakter-Rolle/Upgrade-Set = P6)
  waffenkammer:{name:'Kaserne',    sprite:'b_waffen', era:4, cost:{holz:300,stein:200,gold:80}, tower:true},   // Truppen rekrutieren + global aufrüsten (type-key 'waffenkammer' bleibt für Save/Turm-Gate)
  reparatur:   {name:'Reparatur',  sprite:'b_reparatur', era:6, cost:{holz:240,stein:170}},   // Base nach Nacht reparieren; eigener Standard-Sprite (Tower) statt b_waffen-Dup
  gold:        {name:'Goldmine',   res:'gold', sprite:'gold', base:0.30, era:10, cost:{holz:340,stein:230,korn:140}},
  juwelier:    {name:'Marktplatz', res:'edelstein', sprite:'b_markt', base:0.16, era:12, cost:{holz:300,stein:220,gold:120}},   // §9: 3-Modus-Edelstein-Tausch; eigener Platzhalter-Sprite (Monastery) statt b_juwelier-Dup (bis Steffen generiert)
  heiler:      {name:'Heiler',     sprite:'b_juwelier', era:15, cost:{holz:360,stein:240,gold:160}},   // Consumables (Sink, Mechanik = P5b); produziert nichts
};
const BUILD_ORDER=['schmiede','waffenkammer','reparatur','gold','juwelier','heiler'];  // 6 Dorf-Gebäude = 6 Kuchenstücke, Freischalt-Reihenfolge §3
// Marktplatz §9: 3 Produktions-Modi. Feste Roh-Combo rein → Edelstein raus; höherer Modus = besserer Kurs (mehr Edelstein/Combo).
// Punkte-Wert: Combo 10·1 + 8·1.2 + 5·3 = 34.6 P; Edelstein = 5 P. Modus 1→5 (~72%), 2→6 (~86%), 3→7 (~101% fair).
const MARKT_COMBO={holz:10,stein:8,gold:5};
const MARKT_MODES=[null,{edel:5,name:'Notnagel'},{edel:6,name:'Handel'},{edel:7,name:'Fairer Kurs'}];
function marktMaxMode(s){ const e=s.era||0; return e<13?1:e<15?2:3; }   // Modus 2 ab Stufe 14, Modus 3 ab Stufe 16 (CSV)
// Konverter-Verbrauch eines Gebäudes (dynamisch für den Marktplatz je Modus, sonst statisch)
function buildConsumes(b){ if(b.type==='juwelier'){ const m=MARKT_MODES[b.marktMode||1], c={}; for(const k in MARKT_COMBO) c[k]=MARKT_COMBO[k]/m.edel; return c; } return BUILD_TYPES[b.type].consumes; }
// Produktionsrate eines Gebäudes: Basis × Tempo × Menge × Arbeiter-Boost × Dampf-Boost
function buildRate(s,b){ const T=BUILD_TYPES[b.type]; if(!T||!T.base) return 0;   // Kaserne/Reparatur/Heiler produzieren nichts → 0 statt NaN (Redesign)
  return T.base*(1+0.25*b.tempo)*(1+0.35*b.menge)*s.wboost; }   // M3 (mid:7408): Hütten-Output nur Tempo/Menge — Pawns leben nur in Sammlern
// Netto-Produktion pro Sekunde je Ressource (Produktion minus Konverter-Verbrauch) — macht den Konverter-Engpass sichtbar (Audit-Idee)
function netRate(s){ const r={}; for(const b of s.builds){ const T=BUILD_TYPES[b.type]; if(!T||!T.res)continue; const out=buildRate(s,b), cons=buildConsumes(b); r[T.res]=(r[T.res]||0)+out; if(cons) for(const k in cons) r[k]=(r[k]||0)-out*cons[k]; } return r; }
// Ein Produktions-Tick: Konverter (mit consumes) ziehen Input ab und sind durch Input-Mangel gedeckelt; sonst reine Produktion.
function produce(s,b,dt){ const T=BUILD_TYPES[b.type]; if(!T||!T.res) return 0;   // Kaserne/Reparatur/Heiler produzieren nichts
  let out=buildRate(s,b)*dt; const cons=buildConsumes(b);
  if(cons){ for(const k in cons){ out=Math.min(out, (s.store[k]||0)/cons[k]); } out=Math.max(0,out);
    for(const k in cons) s.store[k]-=out*cons[k]; }
  s.store[T.res]+=out; return out; }
function assignedWorkers(s){ return (s.outposts||[]).reduce((a,o)=>a+(o.workers||0),0); }   // M3 (mid:7408): Pawns NUR in Sammlern (Hütten-Worker entfernt)
function freeWorkers(s){ return s.workerPool-assignedWorkers(s); }
function nextBuildType(s){ return BUILD_ORDER.find(t=>BUILD_TYPES[t].era<=s.era && !s.builds.some(b=>b.type===t)); }
// ----- Außenposten-Sammler (mid:6246): im passenden Biom knapp außerhalb des Dorfs; sammeln Ressource über Zeit bis Cap; Held holt direkt ins Lager ab; upgradebar (Tempo=Rate, Menge=Cap) -----
// Redesign 2026-06-24 (§1/§3): 4 SAMMLER, alle außerhalb. Freischalt-Reihenfolge: Holz S1, Kürbis S2, Stein S3, Pilz S9.
// (Manuelles Sammeln der Knoten bleibt immer möglich — der Sammler automatisiert+skaliert die Ressource, §7016.)
const OUTPOST_TYPES={
  holz:   {name:'Holz-Sammler',   res:'holz',   sprite:'b_holz',   biome:'wald',    era:0, cost:{holz:25},               rate:0.45, cap:28},   // Stufe 1 (cap 55→28, mid:7256)
  korn:   {name:'Kürbis-Sammler', res:'korn',   sprite:'b_korn',   biome:'felder',  era:1, cost:{holz:80},               rate:0.45, cap:28},   // Stufe 2

// Freie (nicht zugewiesene) Arbeiter laufen selbstständig los und farmen zufällige Knoten in Dorfnähe (mid:6048).
// Zugewiesene Arbeiter bleiben Boost-Pawns an ihrer Hütte; nur der freie Pool wird als laufende Pawns abgebildet.
function makeWalker(){ const a=rnd(0,6.2832), d=rnd(BASE_SOLID+24,BASE_SOLID+80);
  return {x:BASE.x+Math.cos(a)*d, y:BASE.y+Math.sin(a)*d, tx:BASE.x, ty:BASE.y, carry:0, type:null, state:'seek', target:null, face:1, moving:false, animT:rnd(0,2)}; }
function updateFreeWalkers(s,dt){
  const want=Math.max(0,freeWorkers(s));
  while(s.freeWalkers.length<want) s.freeWalkers.push(makeWalker());
  if(s.freeWalkers.length>want) s.freeWalkers.length=want;          // gerade zugewiesene verschwinden aus dem freien Schwarm
  const range=areaRadius(s)+150, rate=BAL.heroGatherBase*BAL.workerEff, CAP=5;
  for(const w of s.freeWalkers){ w.harvesting=false;
    if(w.state==='seek'){
      if(!w.target || w.target.amount<=0.4){                         // ziellos/leer → neuen zufälligen Knoten in Reichweite picken
        const cand=s.nodes.filter(n=>n.amount>0.4 && dist(n.x,n.y,BASE.x,BASE.y)<range);
        w.target = cand.length? cand[Math.floor(rnd(0,cand.length))] : null; }
      if(w.target){ w.tx=w.target.x; w.ty=w.target.y;
        if(dist(w.x,w.y,w.target.x,w.target.y)<HARVEST_R){
          const amt=Math.min(rate*dt, w.target.amount, CAP-w.carry);
          if(amt>0){ w.target.amount-=amt; w.carry+=amt; w.type=w.target.type; w.harvesting=true; const wdx=w.target.x-w.x; if(Math.abs(wdx)>2)w.face=wdx<0?-1:1; }   // Schlag-Anim beim Ernten (mid:6582)
          if(w.carry>=CAP || w.target.amount<=0.4) w.state='return'; }
      } else { w.tx=BASE.x+(w.x<BASE.x?-50:50); w.ty=BASE.y; }       // nichts in Reichweite → bei der Basis tigern
    } else {                                                          // return: zur Basis, abliefern beim Übertreten der Dorfgrenze
      w.tx=BASE.x; w.ty=BASE.y;
      if(dist(w.x,w.y,BASE.x,BASE.y)<OUTER_R){
        if(w.carry>0&&w.type){ s.store[w.type]=(s.store[w.type]||0)+w.carry; addPop(s,w.x,w.y-18,COL[w.type]||'#fff','+'+Math.floor(w.carry)); }
        w.carry=0; w.type=null; w.state='seek'; w.target=null; } }
    const ddx=w.tx-w.x; if(Math.abs(ddx)>2) w.face=ddx<0?-1:1; w.moving=dist(w.x,w.y,w.tx,w.ty)>4; w.animT+=dt;   // Anim-Zustand für den Pawn (mid:6576)
    moveToward(w,w.tx,w.ty,onSand(s,w.x,w.y)?66:120,dt);  // Sand bremst auch die Helfer (mid:6060)
  } }

const ENEMY_R=14, HERO_RANGE=72, HERO_ATK_CD=0.55, ENEMY_ATK_CD=1.0;

const ETYPES={

function maxEvo(s){ return s.era; }

// Gegner spawnt an ZUFÄLLIGER, gültiger Position (nicht Wasser/Fels/Dorf, nicht im No-Spawn-Ring), bleibt dort stationär bis Aggro.
function spawnEnemy(s,kind){ const T=ETYPES[kind], R=areaRadius(s), lo=enemyNoSpawn(s);
  for(let t=0;t<40;t++){ const a=rnd(0,6.2832), d=rnd(lo, Math.max(lo+60,R-40)), x=BASE.x+Math.cos(a)*d, y=BASE.y+Math.sin(a)*d;
    if(blocked(s,x,y,18)) continue;

  return false; }
// Gegner zielen auf den NÄCHSTEN aus Held + lebenden Turm-Einheiten (mid:6359)
function enemyTarget(s,e){ let best=s.player, bd=dist(e.x,e.y,s.player.x,s.player.y);
  if(s.towers) for(const t of s.towers){ const u=t.unit; if(u){ const d=dist(e.x,e.y,u.x,u.y); if(d<bd){bd=d;best=u;} } }
  return best; }
// Nacht-Gegner: nur ein Verteidiger (Held/Truppe) IN Aggro-Reichweite lenkt ab; sonst null → Marsch aufs Hauptgebäude (mid:6426)
function nightTarget(s,e){ const T=ETYPES[e.kind]; let best=null,bd=T.aggro;
  const cands=[s.player]; if(s.towers) for(const t of s.towers) if(t.unit) cands.push(t.unit);
  for(const c of cands){ if(c.hp<=0) continue; const d=dist(e.x,e.y,c.x,c.y); if(d<bd){bd=d;best=c;} }
  return best; }
// Turm-Einheiten: bewachen ihren Turm per Aggro (Nahkampf/Fernkampf) oder folgen dem Held (mode 'folgen'). Fallen → respawnen am Turm.
function updateTroops(s,dt){ if(!s.towers) return; const P=s.player;
  for(const t of s.towers){
    if(!t.unit){ t.downT=(t.downT||0)-dt; if(t.downT<=0) spawnTroop(s,t); continue; }
    const u=t.unit, TT=TOWER_TYPES[t.type]; u.animT+=dt; if(u.hurtT>0)u.hurtT-=dt; u.atkT=(u.atkT||0)-dt; u.attacking=false;
    const home=(t.mode==='folgen')?{x:P.x,y:P.y}:{x:s.towerSlots[t.seg].x,y:s.towerSlots[t.seg].y+24};
    const goHome=()=>{ if(dist(u.x,u.y,home.x,home.y)>16){ u.moving=true; const dx=home.x-u.x; if(Math.abs(dx)>2)u.face=dx<0?-1:1; moveToward(u,home.x,home.y,TT.speed,dt); collide(s,u,ENEMY_R); } else u.moving=false; };
    if(TT.role==='heal'){   // Mönch: nächsten verwundeten Verbündeten (Held oder Truppe) heilen
      let tgt=null,td=TT.range;
      if(P.hp<P.hpmax){ const d=dist(P.x,P.y,u.x,u.y); if(d<td){td=d;tgt=P;} }
      for(const o of s.towers){ const ou=o.unit; if(ou&&ou!==u&&ou.hp<ou.hpmax){ const d=dist(ou.x,ou.y,u.x,u.y); if(d<td){td=d;tgt=ou;} } }
      if(tgt){ const dx=tgt.x-u.x; if(Math.abs(dx)>2)u.face=dx<0?-1:1;
        if(td>TT.atkR){ u.moving=true; moveToward(u,tgt.x,tgt.y,TT.speed,dt); collide(s,u,ENEMY_R); }
        else { u.moving=false; u.attacking=true; if(u.atkT<=0){ u.atkT=TT.cd; const h=Math.round(towerAtk(t,s)); tgt.hp=Math.min(tgt.hpmax,tgt.hp+h); addFx(s,'heal',tgt.x,tgt.y-18,42); addPop(s,tgt.x,tgt.y-44,'#7dffa0','+'+h); } } }
      else goHome();
    } else {   // Kämpfer/Lanze (Nahkampf) + Bogenschütze (Fernkampf): nächsten Gegner angreifen
      // 3-Modus-Befehl §5b: Folgen = große Aggro (aggressiv, Vorstoß) · Posten = kleine Aggro (defensiv, nur Nahes) · Wache = normal + nachts ganze Dorfzone
      const aggroMul = t.mode==='folgen'?2.6 : t.mode==='posten'?0.6 : 1, sight=TT.range*aggroMul;
      const nightDef=nightActive(s)&&t.mode==='wache';   // nur Wache verteidigt nachts die ganze Dorfgrenz-Zone (mid:6605)
      let tgt = (u.tgt&&u.tgt.hp>0&&s.enemies.indexOf(u.tgt)>=0 && (nightDef?dist(u.tgt.x,u.tgt.y,BASE.x,BASE.y)<OUTER_R+820:dist(u.tgt.x,u.tgt.y,u.x,u.y)<sight*1.5)) ? u.tgt : null;   // begonnenen Kampf zu Ende führen
      if(!tgt){ let bd=nightDef?1e9:sight; for(const e of s.enemies){ if(e.dead)continue; if(nightDef&&dist(e.x,e.y,BASE.x,BASE.y)>OUTER_R+650)continue; const d=dist(e.x,e.y,u.x,u.y); if(d<bd){bd=d;tgt=e;} } }   // nächstes zuerst, im Nacht-Def alle nahe der Grenze
      u.tgt=tgt;
      if(tgt){ const td=dist(tgt.x,tgt.y,u.x,u.y); const dx=tgt.x-u.x; if(Math.abs(dx)>2)u.face=dx<0?-1:1;
        if(TT.role==='ranged'){
          if(td<TT.range*0.55){ u.moving=true; moveToward(u,u.x*2-tgt.x,u.y*2-tgt.y,TT.speed*0.8,dt); collide(s,u,ENEMY_R); } else u.moving=false;
          u.attacking=true; if(u.atkT<=0){ u.atkT=TT.cd; const dmg=Math.round(towerAtk(t,s)); tgt.hp-=dmg; tgt.hurtT=0.15;
            (s.shots=s.shots||[]).push({x1:u.x,y1:u.y-12,x2:tgt.x,y2:tgt.y-12,age:0}); addPop(s,tgt.x,tgt.y-40,'#bfe9ff','-'+dmg); SFX.hit(); }
        } else {   // Nahkampf (Reichweite via atkR — Lanze sticht weiter)
          if(td>TT.atkR){ u.moving=true; moveToward(u,tgt.x,tgt.y,TT.speed,dt); collide(s,u,ENEMY_R); }
          else { u.moving=false; u.attacking=true; if(u.atkT<=0){ u.atkT=TT.cd; const dmg=Math.round(towerAtk(t,s)); tgt.hp-=dmg; tgt.hurtT=0.18; addPop(s,tgt.x,tgt.y-40,'#bfe9ff','-'+dmg); burst(s,tgt.x,tgt.y-10,'#bfe9ff',4); SFX.hit(); } }
        }
      } else goHome();
    }
    if(u.hp<=0){ burst(s,u.x,u.y-10,'#88aaff',12); addFx(s,'dust',u.x,u.y-4,60); t.unit=null; t.downT=4; }   // §4: Respawn gratis, kleiner Delay (war 8s)
  }
  if(s.shots){ for(const sh of s.shots) sh.age+=dt; s.shots=s.shots.filter(sh=>sh.age<0.16); }
}
function updateCombat(s,dt){ const P=s.player; P.attacking=false;
  if(P.hurtT>0)P.hurtT-=dt; P.atkT=(P.atkT||0)-dt; if(P.invT>0)P.invT-=dt;
  // §10: KEINE Auto-Heilung mehr. Held heilt sich über die Food-Crafting-Treppe (Kürbis-Suppe → Pilz-Sauce → Heiltrank,
  // im Held-Menü) + respawnt nach Tod mit 50% (Kürbis-Suppe-Lore). "Gesund farmen" statt passiver Regeneration.
  // eingesammelte Drop-Säcke (vom Tod) wieder aufnehmen
  for(const d of s.drops){ if(dist(P.x,P.y,d.x,d.y)<HARVEST_R+8){ let tot=0; ALL.forEach(k=>{ s.store[k]=(s.store[k]||0)+(d.carry[k]||0); tot+=d.carry[k]||0; });
    addPop(s,d.x,d.y-20,'#fff','+'+Math.floor(tot)); burst(s,d.x,d.y-8,'#ffe9a8',8); SFX.deposit(); d.got=true; } }
  s.drops=s.drops.filter(d=>!d.got);
  // Außenposten-Sammler (mid:6246): sammeln ihre Ressource über Zeit bis Cap; Held holt sie ab (direkt ins Lager) sobald er nah genug ist
  if(s.outposts) for(const o of s.outposts){ const rate=outpostRate(o,s), res=OUTPOST_TYPES[o.type].res;
    o.store=Math.min(outpostCap(o,s),(o.store||0)+rate*dt);
    if((o.workers||0)>0 && o.store>0){   // §1/mid:7248: Pawns tragen einen TEIL automatisch heim — nicht genug, sodass sich der Sammler trotzdem füllt

  for(const e of s.enemies){ const T=ETYPES[e.kind]; e.animT+=dt; if(e.hurtT>0)e.hurtT-=dt; e.attacking=false;   // Default: greift nicht (Angriffs-Pose nur im Reach gesetzt, Playtester A5)

  // Held greift automatisch den nächsten Gegner in Reichweite an

const FX={}; ['dust','heal'].forEach(k=>{ const i=new Image(); i.src='ts/u/fx_'+k+'.png'; FX[k]=i; });
const FXFPS={dust:18, heal:15};
function addFx(s,kind,x,y,size){ if(!s.fx)s.fx=[]; const im=FX[kind], fr=im.naturalHeight?Math.max(1,Math.round(im.naturalWidth/im.naturalHeight)):8;
  s.fx.push({kind,x,y,size:size||60,age:0,max:fr/(FXFPS[kind]||16)}); }
function drawFx(s){ for(const e of s.fx){ const im=FX[e.kind]; if(!im.complete||!im.naturalWidth)continue;
  const fh=im.naturalHeight, fr=Math.max(1,Math.round(im.naturalWidth/fh)), col=Math.min(fr-1,Math.floor(e.age/e.max*fr)), sc=e.size/fh;
  ctx.drawImage(im, col*fh,0,fh,fh, e.x-fh*sc/2, e.y-fh*sc/2, fh*sc, fh*sc); } }
// Per-Unit Größen-/Anker-Korrektur (mid:6611): Lance ist schmal+steht höher (Fuß 119), Mönch kürzer → angleichen, damit alle gleich groß/geerdet wirken
const USCALE={lance_blue:1.5, monk_blue:1.2}, UFOOT={lance_blue:119, monk_blue:134, archer_purple:136}, UCX={lance_blue:89, monk_blue:96, archer_purple:93};
function drawUnit(unit,anim,t,x,y,dispH,flip){ const im=U[unit+'_'+anim]||U[unit+'_idle']; if(!im||!im.complete||!im.naturalWidth) return;
  dispH*=SC; const frames=Math.max(1,Math.round(im.naturalWidth/UFRAME)), col=Math.floor(t*8)%frames, sc=dispH/90*(USCALE[unit]||1), fw=UFRAME*sc;
  const cx=UCX[unit]||98, fy=UFOOT[unit]||137;
  ctx.save(); if(flip){ ctx.translate(x,0); ctx.scale(-1,1); ctx.translate(-x,0); }
  ctx.drawImage(im, col*UFRAME,0,UFRAME,UFRAME, x-cx*sc, y-fy*sc, fw, fw);
  ctx.restore(); }

function biomeAt(s,x,y){ const N=(s.biomes&&s.biomes.length)||6, dx=x-BASE.x, dy=y-BASE.y;

function moveToward(o,tx,ty,sp,dt,st,r){ const d=dist(o.x,o.y,tx,ty); if(d<1)return true;
  let hx=(tx-o.x)/d, hy=(ty-o.y)/d;   // Such-Richtung zum Ziel
  if(st&&st.obstacles){ r=r||0; let rx=0,ry=0, frontal=0, fnx=0, fny=0;   // Hindernis-Ausweichen (Playtester A3): um Felsen herumgleiten statt reinrennen
    for(const ob of st.obstacles){ const ox=o.x-ob.x, oy=o.y-ob.y, od=Math.hypot(ox,oy)||0.01, reach=ob.r+r+38;

        const dotF=-ux*hx-uy*hy;   // wie frontal liegt das Hindernis in Laufrichtung (normiert, 1=direkt davor)
        if(dotF>frontal){ frontal=dotF; fnx=ux; fny=uy; } } }   // stärkstes frontales Hindernis merken (Richtung weg davon)
    if(rx||ry) { hx+=rx*1.6; hy+=ry*1.6; }

    const hl=Math.hypot(hx,hy)||1; hx/=hl; hy/=hl; }

function nearestNode(x,y,nodes){ let b=null,bd=1e9; for(const n of nodes){ if(n.amount<=0.4)continue;

function blocked(s,x,y,r){ if(dist(x,y,BASE.x,BASE.y)<BASE_SOLID+r) return true;

function spawnNode(s,type,ringMin){ const R=areaRadius(s), lo=ringMin||(OUTER_R+40), allowed=activeKeys(s.era);   // Ressourcen erst JENSEITS des Dorf-Rings (mid:6258)

function resolve(o,cx,cy,R){ const d=dist(o.x,o.y,cx,cy); if(d<R){ if(d<0.01){o.x=cx+R;return;} o.x=cx+(o.x-cx)/d*R; o.y=cy+(o.y-cy)/d*R; } }

function separateUnits(s){ const L=[]; const add=(e,r,fix)=>{ if(e&&!e.dead) L.push({e,r,fix:!!fix}); };
  add(s.player,15,true);
  for(const e of s.enemies) add(e,13);

  for(let i=0;i<L.length;i++) for(let j=i+1;j<L.length;j++){ const a=L[i],b=L[j];

function blobPathCtx(B,scale){ const N=B.pts.length;

  bgm.addEventListener('ended',()=>{ setTimeout(()=>{ if(bgmWanted&&!musicMuted) playBgmTrack(nextBgmIdx()); }, 700); });   // kurze Pause, dann shuffle-next mit Fade-in

    const foes=(s.enemies||[]).filter(e=>!e.dead && e.state!=='return');
    if(foes.length){ const pn=document.getElementById('panel'); if(pn) pn.classList.remove('open');   // Kampf → Panel zu, freie Sicht aufs Gefecht
      let b=null,bd=1e9; for(const e of foes){ const d=dist(e.x,e.y,P.x,P.y); if(d<bd){bd=d;b=e;} } if(b){ P.tx=b.x; P.ty=b.y; this.hero='⚔ kämpft'; return; } }
    if(dist(P.x,P.y,P.tx,P.ty)>14) return;   // noch unterwegs → Ziel halten
    if(carryTotal(P.carry)>=s.cap*0.9){ P.tx=BASE.x; P.ty=BASE.y; this.hero='🏠 liefert ab'; return; }
    let bo=null,bs=12; if(s.outposts) for(const o of s.outposts){ if((o.store||0)>bs){ bs=o.store; bo=o; } }
    if(bo){ P.tx=bo.x; P.ty=bo.y; this.hero='📦 holt Sammler'; return; }
    // gezielt den Engpass-Rohstoff für den nächsten Aufstieg sammeln (sonst verhungert z.B. Korn)
    let want=null; const ec=(s.era+1<ERAS.length)?eraCost(s.era+1):null;
    if(ec){ let wr=1e9; for(const k of Object.keys(ec)){ const r=(s.store[k]||0)/ec[k]; if(r<wr){ wr=r; want=k; } } }
    let n=want?nearestNode(P.x,P.y,(s.nodes||[]).filter(nd=>nd.type===want)):null;
    if(!n) n=nearestNode(P.x,P.y,s.nodes||[]);
    if(n){ P.tx=n.x; P.ty=n.y; this.hero='⛏ '+(n.type&&NAME[n.type]?NAME[n.type]:'sammelt'); return; }
    P.tx=BASE.x+rnd(-30,30); P.ty=BASE.y+rnd(-30,30); this.hero='… wartet'; },
  // ~alle 0.8s: eine Wirtschafts-/Kampf-Entscheidung
  think(dt){ if(!this.on) return; const s=game.s; if(!s||!s.charChosen) return; this.runTime=(this.runTime||0)+dt; this.steer();   // runTime = aufsummierte Spielzeit (dt×Speed pro Frame, mid:7215)
    this.acc+=dt; if(this.acc<0.8) return; this.acc=0; this.decide(s); this.updateHud(); },
  fmtTime(t){ t=Math.floor(t||0); const hh=Math.floor(t/3600), mm=Math.floor((t%3600)/60), ss=t%60, p=n=>String(n).padStart(2,'0'); return (hh>0?hh+':':'')+p(mm)+':'+p(ss); },
  aff(s,id){ const u=ALLUP.find(x=>x.id===id); return u && (!u.show||u.show(s)) && !(u.locked&&u.locked(s)) && (!u.lvl||u.lvl(s)<heroMaxLvl(s)) && canAfford(s,u.cost(s)); },   // locked (z.B. Helfer-Pro-Stufe-Cap) respektieren, sonst loopt der Bot
  schmiedeIdx(s){ return (s.builds||[]).findIndex(b=>b.type==='schmiede'); },
  peek(t,tab){ if(tab) game.tab=tab; game.openPanelFor(t); },   // Panel sichtbar öffnen, damit der Zuschauer den Dialog sieht (mid:7189)
  upPanel(s,id){ if(UP_KAMPF.some(u=>u.id===id)){ const i=this.schmiedeIdx(s); return i>=0?[i,null]:null; }   // Kampf-Upgrades → Schmiede-Panel
    return UP_HELD.some(u=>u.id===id)?['hero',null]:['castle',null]; },   // Held-Upgrades → Helden-Menü, Rest (expand etc.) → Burg/Dorf (mid:7420)
  decide(s){
    // 1) heilen wenn angeschlagen (Heil-Craft sitzt im Burg/Held-Panel)
    if(s.player.hp < s.player.hpmax*0.42){ for(const h of ['heiltrank','sauce','suppe']){ if(this.aff(s,h)){ this.peek('hero'); game.buy(h); this.note='💚 heilt'; return; } } }
    // 2) freie Pawns in Sammler zuweisen (M3, mid:7408: Pawns nur noch in Sammlern) — immer sinnvoll
    if(freeWorkers(s)>0){ const o=(s.outposts||[]).find(o=>(o.workers||0)<4); if(o){ o.workers=(o.workers||0)+1; SFX.buy(); this.peek('op'+s.outposts.indexOf(o)); this.note='👷 Pawn→Sammler'; return; } }
    // Aufstiegs-Lage bestimmen (Prep → Save → Go)
    const next=s.era+1, ec=(next<ERAS.length)?eraCost(next):null;
    const frac=ec?Math.min(...Object.keys(ec).map(k=>(s.store[k]||0)/ec[k])):1;   // schwächste Komponente
    const canAsc=ec && !nightActive(s) && s.pendingEra==null && canAfford(s,ec);
    const willFight=ec?nightGated(next):false;   // erst Aufstieg auf Stufe 7+ (era6+) startet eine Nacht-Welle
    const haveTroops=(s.towers||[]).length>=Math.min(2,towerAllowance(s));
    const ready=!willFight || (haveTroops && s.player.hp>s.player.hpmax*0.6);   // ohne Nacht: immer bereit
    // 3) aufsteigen sobald leistbar + bereit
    if(canAsc && ready){ this.peek('castle','dorf'); game.buyEra(); this.note='🌙 Aufstieg auf Stufe '+(next+1)+'!'; return; }
    // Spar-Modus NUR wenn schon aufstiegs-bereit (Truppen stehen) aber Rohstoffe noch fehlen — sonst erst Prep bauen
    const saving=ready && ec && frac>0.6 && !canAsc;
    // 4) Kern-Wirtschaft: Sammler bauen (Passiv-Einkommen) — im Spar-Modus nur bis 2 Stück
    if(nextOutpostType(s) && this.aff(s,'buildpost') && (!saving || (s.outposts||[]).length<2)){ this.peek('castle','dorf'); game.buy('buildpost'); this.note='⛺ baut Sammler'; return; }
    // 5) Dorf-Hütte (Schmiede/Kaserne ab Stufe 4 etc.) — Passiv-Produktion
    if(nextBuildType(s) && this.aff(s,'build') && !saving){ this.peek('castle','dorf'); game.buy('build'); this.note='🏚 baut Hütte'; return; }
    // 6) Truppe bauen bis zum Stufen-Limit — Prep für nacht-gated Aufstieg (baut auch im Spar-Fall solange noch nötig)
    if((s.towers||[]).length < towerAllowance(s) && (!saving || (willFight && !haveTroops))){ if(this.buildTroop(s)){ this.note='🛡 baut Truppe'; return; } }
    // 7) Helfer anheuern — nur wenn Sammler sie aufnehmen können + nicht im Spar-Modus (M3: nur Sammler)
    const cap=(s.outposts||[]).reduce((a,o)=>a+(4-(o.workers||0)),0);
    const wTarget=Math.min(2+s.era*2, 14); if(!saving && cap>0 && s.workerPool<wTarget && this.aff(s,'hire')){ this.peek('castle','dorf'); game.buy('hire'); this.note='🧑 heuert an'; return; }
    // 8) ein leistbares Upgrade (rotierend, leicht ineffizient = menschlich) — nur wenn flüssig; Kampf-Upgrades NUR wenn Schmiede steht
    if(!saving){ const ups=['gather','cap','vita','angriff','ruestung','speed','steam','expand','wirbel','sturm'];
      for(let i=0;i<ups.length;i++){ const id=ups[(this.upi+i)%ups.length];
        if(UP_KAMPF.some(u=>u.id===id) && this.schmiedeIdx(s)<0) continue;   // Kampf-Upgrades sind an der Schmiede gegated (wie für den Spieler)
        if(this.aff(s,id)){ const pp=this.upPanel(s,id); if(pp) this.peek(pp[0],pp[1]); game.buy(id); this.upi=(this.upi+i+1)%ups.length; this.note='⬆ '+id; return; } } }
    this.note=saving?('💰 spart für Aufstieg ('+Math.min(99,Math.round(frac*100))+'%)'):'⛏ sammelt…'; },
  buildTroop(s){ if(!s.towerSlots) return false; let seg=-1; for(let i=0;i<s.towerSlots.length;i++){ if(!towerAt(s,i)){ seg=i; break; } } if(seg<0) return false;
    const avail=TOWER_ORDER.filter(t=> s.era>=TOWER_TYPES[t].era && canAfford(s,TOWER_TYPES[t].cost)); if(!avail.length) return false;
    const type=avail[avail.length-1]; game.panelFor='tb'+seg; game.buildTower(type); return true; },   // buildTower öffnet danach das Truppen-Panel (sichtbar für den Zuschauer)
  setSpeed(n){ this.speed=n; this.updateHud(); },
  toggle(){ game.toggle(); say(game.s.paused?'⏸ Pause — die Show steht still.':'▶ Weiter geht\'s.'); this.updateHud(); },   // ⏸ im Bot-HUD = ganzes Spiel einfrieren/fortsetzen (mid:7195); friert auch den Bot, da der Loop bei s.paused step+think überspringt
  buildHud(){ if(this.hud) return;
    // Read-only Status-Overlay oben-mittig — NICHT klickbar (mid:7203: im Autoplay nur das Burger-Menü bedienbar)
    const h=document.createElement('div'); h.id='botHud';
    h.style.cssText='position:fixed;left:50%;transform:translateX(-50%);top:6px;z-index:80;pointer-events:none;background:rgba(20,16,30,.86);border:1px solid #5a3fb0;border-radius:10px;padding:6px 10px;font:600 12px/1.3 system-ui,sans-serif;color:#e8e0ff;box-shadow:0 4px 14px rgba(0,0,0,.45);min-width:150px;text-align:center;backdrop-filter:blur(3px)';
    const line=document.createElement('div'); line.id='botHudLine'; h.appendChild(line); document.body.appendChild(h); this.hud=h;
    // Steuerung (Speed + Pause) ins Burger-Menü verstecken (mid:7203)
    const mi=document.getElementById('menuItems');
    if(mi && !document.getElementById('botCtrl')){ const wrap=document.createElement('div'); wrap.id='botCtrl'; wrap.style.cssText='width:190px;margin-top:6px';
      const hd=document.createElement('div'); hd.textContent='🤖 Auto-Play'; hd.style.cssText='margin-top:10px;font-size:10px;font-weight:800;letter-spacing:.5px;color:#a98fe0;text-transform:uppercase'; wrap.appendChild(hd);
      const mkb=(t,fn)=>{ const b=document.createElement('button'); b.className='devbtn'; b.style.cssText+=';color:#cbb8ff;border-color:#6b4fd0;background:rgba(30,22,46,.7)'; b.textContent=t; b.onclick=fn; return b; };
      const row=document.createElement('div'); row.style.cssText='display:flex;gap:5px;margin-top:7px';
      [['1×',()=>this.setSpeed(1)],['2×',()=>this.setSpeed(2)],['4×',()=>this.setSpeed(4)]].forEach(([t,fn])=>{ const b=mkb(t,fn); b.style.marginTop='0'; row.appendChild(b); });
      wrap.appendChild(row); wrap.appendChild(mkb('⏸ Pause / ▶ Weiter',()=>this.toggle())); mi.appendChild(wrap); }
    // Spieler-Interaktion sperren — Canvas, Panel, Minimap nicht klickbar; nur Burger bleibt (mid:7203)
    cv.style.pointerEvents='none'; ['panel','minimap'].forEach(id=>{ const el=document.getElementById(id); if(el) el.style.pointerEvents='none'; });
    this.updateHud(); },
  updateHud(){ if(!this.hud) return; const s=game.s, l=document.getElementById('botHudLine'); if(!l) return;
    l.innerHTML='🤖 <b>'+(s.paused?'⏸ Pause':'Auto-Play')+'</b> · '+this.speed+'× · ⏱ '+this.fmtTime(this.runTime)+(this.offlinePlay?' · 💤':'')+'<br>Stufe '+((s.era||0)+1)+' · Tag '+(s.day||1)+'<br><span style="color:#b9a7ff">'+this.hero+'</span> · <span style="color:#8fe0a0">'+this.note+'</span>'; },
};
window.game=game;   // WICHTIG: Inline-onclick-Handler (z.B. Portrait-Hub) sehen das const game sonst NICHT (const landet nicht auf window) → Klicks tot (mid:7335)
window.Bot=Bot;   // für Debugging + Tests erreichbar
if(new URLSearchParams(location.search).has('autoplay')||new URLSearchParams(location.search).has('bot')) setTimeout(()=>Bot.start(), 400);

game.init();
</script>
