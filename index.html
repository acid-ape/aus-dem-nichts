<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Aus dem Nichts</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#10241a}
  #cv{position:fixed;inset:0;display:block;touch-action:none;image-rendering:pixelated}
  #ui{position:fixed;inset:0;pointer-events:none;font:14px/1.4 "Segoe UI",system-ui,-apple-system,sans-serif;color:#ece7ff}
  #resbar{position:absolute;top:calc(env(safe-area-inset-top) + 10px);left:calc(env(safe-area-inset-left) + 8px);
    display:flex;flex-direction:column;gap:5px;align-items:flex-start}
  #resbar .r{display:flex;align-items:center;gap:5px;font-weight:800;font-size:16px;color:#fff;
    text-shadow:0 1px 2px #000,0 0 4px rgba(0,0,0,.75)}
  #resbar .r img{height:28px;width:28px;image-rendering:pixelated;filter:drop-shadow(0 1px 1px rgba(0,0,0,.6))}
  #resbar .r .rn{font-size:11px;font-weight:700;color:#cdbfe8;min-width:48px;text-shadow:0 1px 2px #000}
  #resbar .r b{min-width:30px}
  #resbar .sack{display:flex;align-items:center;gap:6px;color:#ffe08a;font-weight:800;font-size:19px;
    text-shadow:0 1px 2px #000,0 0 4px rgba(0,0,0,.85)}
  #resbar .sack .bag{font-size:26px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.7))}
  #resbar .rdiv{width:62px;height:2px;border-radius:2px;background:rgba(255,255,255,.4);margin:5px 0 6px;
    box-shadow:0 1px 1px rgba(0,0,0,.5)}
  /* zwischen Resbar (links) und Burger (rechts) gespannt → überlappt die Inventar-Zahl nicht mehr (mid:6063) */
  #quest{position:absolute;top:calc(env(safe-area-inset-top) + 8px);
    left:calc(env(safe-area-inset-left) + 138px);right:calc(env(safe-area-inset-right) + 64px);
    text-align:center;font-size:13.5px;font-weight:600;color:#fff;background:rgba(12,9,22,.7);backdrop-filter:blur(6px);
    border:1px solid rgba(255,224,138,.55);border-radius:13px;padding:6px 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;
    box-shadow:0 2px 10px rgba(0,0,0,.35)}
  #quest.expanded{white-space:normal;overflow:visible;text-overflow:clip;z-index:30}   /* antippen klappt das Ziel voll aus (mid:6371) */
  #quest .qt{color:#ffe08a;font-weight:800;margin-right:6px}
  #quest .qp{color:#9fe0b0;font-weight:700;margin-left:6px}
  #topbtns{position:absolute;top:calc(env(safe-area-inset-top) + 8px);right:calc(env(safe-area-inset-right) + 10px);
    display:flex;flex-direction:column;gap:8px;pointer-events:auto;align-items:flex-end}
  #topbtns button{width:46px;height:46px;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    background:rgba(22,14,43,.72);backdrop-filter:blur(6px);border:1px solid rgba(160,91,255,.4);color:#ece7ff}
  #topbtns button svg{width:23px;height:23px}
  #topbtns button:active{transform:scale(.93)}
  #menuBtn{border-color:rgba(160,91,255,.7)!important}
  #menuItems{display:none;flex-direction:column;gap:8px;align-items:flex-end}
  #menuItems.open{display:flex}
  #panel{position:absolute;left:0;right:0;bottom:0;max-height:62vh;
    padding:14px 14px calc(env(safe-area-inset-bottom) + 16px);
    background:linear-gradient(180deg,rgba(12,9,22,.82),rgba(12,9,22,.96));backdrop-filter:blur(10px);
    border-top:1px solid rgba(160,91,255,.35);border-radius:20px 20px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.4);
    transform:translateY(104%);transition:transform .26s cubic-bezier(.22,1,.36,1);
    overflow-y:auto;pointer-events:none}
  #panel.open{transform:translateY(0);pointer-events:auto}
  #panel .grab{width:42px;height:4px;border-radius:3px;background:rgba(203,184,255,.4);margin:-4px auto 12px;cursor:pointer}
  #closeShop{position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:11px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:#e7deff;background:rgba(40,28,70,.85);border:1px solid #3a2a63}
  #closeShop:active{transform:scale(.93)} #closeShop svg{width:20px;height:20px}
  #tabs{display:flex;gap:6px;margin:0 0 10px}
  #tabs button{flex:1;cursor:pointer;color:#cbb8ff;background:rgba(22,14,43,.7);border:1px solid #2f2152;
    border-radius:10px;padding:8px 4px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px}
  #tabs button svg{width:16px;height:16px}
  #tabs button.on{color:#fff;background:linear-gradient(90deg,rgba(160,91,255,.4),rgba(255,79,216,.22));border-color:#a05bff}
  #shop{display:flex;flex-direction:column;gap:9px}
  button.up{text-align:left;cursor:pointer;color:#f3eeff;background:linear-gradient(180deg,rgba(40,28,70,.9),rgba(26,18,46,.92));
    border:1px solid #3a2a63;border-radius:14px;padding:12px 13px;font-size:14px;line-height:1.3;display:flex;gap:12px;align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,.25)}
  button.up img{height:38px;width:38px;flex:0 0 auto;image-rendering:pixelated;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  button.up .tx{flex:1;min-width:0}
  button.up:not(:disabled):active{transform:scale(.98);border-color:#a05bff}
  button.up:disabled{opacity:.45;filter:saturate(.6)}
  button.up .t{font-weight:800;display:block;font-size:14.5px}
  button.up .d{color:#b9aee0;font-size:12px;margin-top:1px;display:block}
  button.up .k{color:#ffd98a;font-size:12px;margin-top:4px;display:block;font-weight:700}
  button.up.era{border-color:#a05bff;background:linear-gradient(180deg,rgba(160,91,255,.32),rgba(255,79,216,.18));margin-top:2px}
  #panel .ph{font-weight:800;font-size:16px;color:#fff;margin:0 2px 10px;letter-spacing:.3px}
  #cheatBtn{margin-top:14px;width:100%;cursor:pointer;color:#8fe3b0;background:rgba(18,30,22,.7);
    border:1px dashed #3f7a55;border-radius:10px;padding:9px;font-size:12.5px;font-weight:700}
  #cheatBtn:active{transform:scale(.98)}
  #achOverlay{position:absolute;inset:0;background:rgba(6,4,14,.62);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;pointer-events:auto;z-index:20;padding:18px}
  #achOverlay.open{display:flex}
  #achCard{width:100%;max-width:440px;max-height:80vh;display:flex;flex-direction:column;
    background:linear-gradient(180deg,rgba(18,12,34,.97),rgba(12,9,22,.99));border:1px solid rgba(160,91,255,.4);
    border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.5);overflow:hidden}
  #achHead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
    font-weight:800;font-size:17px;color:#fff;border-bottom:1px solid rgba(160,91,255,.22)}
  #achClose{width:34px;height:34px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:#e7deff;background:rgba(40,28,70,.85);border:1px solid #3a2a63} #achClose svg{width:18px;height:18px}
  #achList{overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .ach{display:flex;gap:12px;align-items:center;padding:10px 12px;border-radius:13px;
    background:linear-gradient(180deg,rgba(40,28,70,.7),rgba(26,18,46,.7));border:1px solid #2f2152}
  .ach.got{border-color:#ffd86b;background:linear-gradient(180deg,rgba(70,56,20,.55),rgba(40,30,12,.5))}
  .ach img{height:36px;width:36px;flex:0 0 auto;image-rendering:pixelated}
  .ach.locked img{filter:grayscale(1) brightness(.5)}
  .ach .an{font-weight:800;font-size:14px;color:#fff;display:flex;align-items:center;gap:6px}
  .ach.locked .an{color:#9b90c4}
  .ach .ad{font-size:12px;color:#b9aee0;margin-top:2px}
  .ach .tick{margin-left:auto;color:#ffd86b;font-weight:800;font-size:15px}
  #achProg{font-size:13px;color:#cbb8ff;font-weight:700}
  #charSelect{position:absolute;inset:0;background:rgba(6,4,14,.85);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;pointer-events:auto;z-index:30;padding:18px}
  #charSelect.open{display:flex}
  #charCard{width:100%;max-width:460px;text-align:center}
  .ch-title{font-weight:800;font-size:22px;color:#fff;margin-bottom:4px}
  .ch-sub{font-size:13px;color:#cbb8ff;margin-bottom:16px}
  #charRow{display:flex;flex-direction:column;gap:12px}
  .ch-card{display:flex;align-items:center;gap:14px;text-align:left;cursor:pointer;padding:12px;border-radius:16px;
    background:linear-gradient(180deg,rgba(40,28,70,.92),rgba(26,18,46,.94));border:2px solid #3a2a63}
  .ch-card:active{transform:scale(.98)} .ch-card:hover{border-color:#a05bff}
  .ch-portrait{width:84px;height:84px;flex:0 0 auto;image-rendering:pixelated;border-radius:12px;object-fit:contain;
    background-color:rgba(0,0,0,.3);box-shadow:inset 0 0 0 1px rgba(160,91,255,.35);padding:6px}
  .ch-name{font-weight:800;font-size:18px;color:#fff}
  .ch-abil{font-size:13px;color:#c2b6e6;margin-top:3px;line-height:1.3}
  #say{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom) + 14px);transform:translateX(-50%);
    max-width:88vw;text-align:center;color:#ffb0ec;font-size:13.5px;background:rgba(10,8,18,.62);
    backdrop-filter:blur(6px);border-radius:12px;padding:7px 13px;border:1px solid rgba(160,91,255,.25);
    transition:opacity .3s;opacity:0}
  #hint{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom) + 56px);transform:translateX(-50%);
    color:#cfc6e6;font-size:12px;opacity:.85;text-shadow:0 1px 3px #000;text-align:center}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ui">
  <div id="resbar"></div>
  <div id="quest"></div>
  <div id="topbtns">
    <button id="menuBtn" title="Menü"></button>
    <div id="menuItems">
      <button id="soundBtn" title="Ton"></button>
      <button id="achBtn" title="Erfolge"></button>
      <button id="pauseBtn" title="Pause"></button>
      <button id="resetBtn" title="Neu"></button>
    </div>
  </div>
  <div id="achOverlay"><div id="achCard">
    <div id="achHead"><span>🏆 Erfolge</span><button id="achClose" title="Schliessen"></button></div>
    <div id="achList"></div>
  </div></div>
  <div id="charSelect"><div id="charCard">
    <div class="ch-title">Willkommen, Fremder.</div>
    <div class="ch-sub">Der Älteste: „Wähle, wer du sein willst — jede Wahl bleibt dein ganzes Leben."</div>
    <div id="charRow"></div>
  </div></div>
  <div id="panel">
    <div class="grab"></div>
    <button id="closeShop" title="Schliessen"></button>
    <div class="ph">Aufbau &amp; Upgrades</div>
    <div id="tabs"><button data-tab="held" class="on"></button><button data-tab="dorf"></button><button data-tab="kampf"></button></div>
    <div id="shop"></div>
    <button id="cheatBtn" title="Test-Cheat">+50 auf alle Ressourcen (Test)</button>
  </div>
  <div id="say"></div>
</div>

<script>
"use strict";
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const VS=0.66;  // Gesamt-Maßstab Dorf+Sprites zusammen relativ zur Welt (mid:6199/6201/6202): ganze Anlage UND Sprites mit DEMSELBEN Faktor → mehr Karte, interne Proportion exakt wie im guten Original (SC=1 / VILLAGE_R=280)
const WORLD=21000, BASE={x:WORLD/2,y:WORLD/2}, HARVEST_R=58, BASE_R=Math.round(96*VS), BASE_SOLID=Math.round(40*VS);  // deutlich größere runde Welt (mid:6171)
const SC=VS;  // Sprites skalieren 1:1 mit der Dorf-Anlage
const PR=13, WR=11;
/* ---------- Balance (zentral, leicht tunebar) ----------
   Ziel: aktives Sammeln bleibt lange der STÄRKSTE Weg; Auto/Idle ist langsamer Bonus
   (v.a. offline). Auto-Producer schwächer+teurer+erst ab Dorf-Era. */
const BAL={
  heroGatherBase:5.0, gatherPerLvl:2,   // Held aktiv: Basis-Rate + pro Werkzeug-Level
  workerEff:0.4,                          // Helfer sammeln mit 40% der Held-Rate (war 0.5)
  sawmillRate:0.3, quarryRate:0.2,        // pro Gebäude-Level/Sekunde (war 0.5 / 0.35)
  autoFromEra:1,                          // Sägewerk/Steinbruch erst ab Zeitalter 1 (Dorf)
};
// Produktionsgebäude: je 1 pro Zeitalter, steht in einem Kuchenstück. Arbeiter werden ihnen zugewiesen.
const BUILD_TYPES={
  holz:    {name:'Holzfäller', res:'holz', sprite:'b_holz', base:0.45, era:1, cost:{holz:50,korn:30}},
  stein:   {name:'Steinbruch', res:'stein', sprite:'quarry', base:0.38, era:2, cost:{holz:120,stein:50}},
  // Produktionskette: Schmiede VERBRAUCHT Holz+Stein und veredelt sie zu Gold
  schmiede:{name:'Schmiede',   res:'gold', sprite:'b_schmiede', base:0.20, era:3, cost:{holz:160,stein:110}, consumes:{holz:1.4,stein:0.9}},
  // 2. Veredelungs-Stufe: Juwelier wandelt Gold+Stein → Kristall
  juwelier:{name:'Juwelier',   res:'kristall', sprite:'b_juwelier', base:0.12, era:4, cost:{holz:220,stein:160,gold:60}, consumes:{gold:1.0,stein:1.3}},
  gold:    {name:'Goldmine',   res:'gold', sprite:'gold',    base:0.30, era:5, cost:{holz:300,stein:200,korn:140}},
  waffenkammer:{name:'Waffenkammer', sprite:'b_waffen', era:6, cost:{holz:360,stein:260,gold:160}, tower:true},   // Stufe 7: schaltet Kampf-Türme im äußeren Ring frei (Turm-System folgt)
};
const BUILD_ORDER=['holz','stein','schmiede','juwelier','gold','waffenkammer'];  // 6 Dorf-Gebäude = 6 Kuchenstücke (Kürbisfeld ist jetzt Außenposten, mid:6313)
// Produktionsrate eines Gebäudes: Basis × Tempo × Menge × Arbeiter-Boost × Dampf-Boost
function buildRate(s,b){ return BUILD_TYPES[b.type].base*(1+0.25*b.tempo)*(1+0.35*b.menge)*(1+0.5*b.workers)*s.wboost; }
// Ein Produktions-Tick: Konverter (mit consumes) ziehen Input ab und sind durch Input-Mangel gedeckelt; sonst reine Produktion.
function produce(s,b,dt){ const T=BUILD_TYPES[b.type]; if(!T||!T.res) return 0;   // Waffenkammer u.ä. produzieren nichts (mid:6315)
  let out=buildRate(s,b)*dt;
  if(T.consumes){ for(const k in T.consumes){ out=Math.min(out, (s.store[k]||0)/T.consumes[k]); } out=Math.max(0,out);
    for(const k in T.consumes) s.store[k]-=out*T.consumes[k]; }
  s.store[T.res]+=out; return out; }
function assignedWorkers(s){ return s.builds.reduce((a,b)=>a+b.workers,0); }
function freeWorkers(s){ return s.workerPool-assignedWorkers(s); }
function nextBuildType(s){ return BUILD_ORDER.find(t=>BUILD_TYPES[t].era<=s.era && !s.builds.some(b=>b.type===t)); }
// ----- Außenposten-Sammler (mid:6246): im passenden Biom knapp außerhalb des Dorfs; sammeln Ressource über Zeit bis Cap; Held holt direkt ins Lager ab; upgradebar (Tempo=Rate, Menge=Cap) -----
const OUTPOST_TYPES={
  korn:   {name:'Kürbis-Sammler', res:'korn',   sprite:'b_korn',   biome:'felder', era:1, cost:{holz:80},               rate:0.45, cap:55},   // Stufe 2 (Kürbisfeld ist jetzt hier, mid:6313)
  pilze:  {name:'Pilz-Sammler',   res:'pilze',  sprite:'b_pilze',  biome:'wald',   era:3, cost:{holz:160,korn:70},      rate:0.45, cap:55},   // Stufe 4
  beeren: {name:'Beeren-Sammler', res:'beeren', sprite:'b_beeren', biome:'felder', era:5, cost:{holz:220,stein:90,korn:80}, rate:0.45, cap:72}, // Stufe 6
};
const OUTPOST_ORDER=['korn','pilze','beeren'];
function nextOutpostType(s){ return OUTPOST_ORDER.find(t=>OUTPOST_TYPES[t].era<=s.era && !(s.outposts||[]).some(o=>o.type===t)); }
function outpostRate(o){ return OUTPOST_TYPES[o.type].rate*(1+0.5*(o.tempoLvl||0)); }   // Tempo-Level erhöht Sammelrate
function outpostCap(o){ return Math.round(OUTPOST_TYPES[o.type].cap*(1+0.6*(o.mengeLvl||0))); }   // Menge-Level erhöht Cap
function outpostUpCost(o,kind,s){ const lvl=(kind==='tempo'?o.tempoLvl:o.mengeLvl)||0, base=OUTPOST_TYPES[o.type].cost, c={};
  for(const k in base) c[k]=Math.round(base[k]*0.55*Math.pow(1.5,lvl)); return c; }
// platziert einen Außenposten im passenden Biom im Ring knapp außerhalb des Dorfs (innerhalb des Gegner-Frei-Rings), frei von Hindernissen/Wasser
function placeOutpost(s,type){ const T=OUTPOST_TYPES[type], r0=OUTER_R+70, r1=Math.max(r0+140, enemyNoSpawn(s)-40);
  for(let t=0;t<240;t++){ const a=rnd(0,6.2832), d=rnd(r0,r1), x=BASE.x+Math.cos(a)*d, y=BASE.y+Math.sin(a)*d;
    if(biomeAt(s,x,y)===T.biome && !blocked(s,x,y,30)) return {type,x,y,store:0,tempoLvl:0,mengeLvl:0}; }
  for(let t=0;t<120;t++){ const a=rnd(0,6.2832), d=rnd(r0,r1), x=BASE.x+Math.cos(a)*d, y=BASE.y+Math.sin(a)*d;
    if(!blocked(s,x,y,30)) return {type,x,y,store:0,tempoLvl:0,mengeLvl:0}; }
  const a=rnd(0,6.2832); return {type,x:BASE.x+Math.cos(a)*r1,y:BASE.y+Math.sin(a)*r1,store:0,tempoLvl:0,mengeLvl:0}; }
// ----- Türme (mid:6357/6359): auf den 12 Ring-Slots, Waffenkammer (Stufe 7) als Gate. Je Turm 1 Einheit (Kämpfer=Nahkampf / Bogenschütze=Fernkampf), bewacht den Turm per Aggro oder folgt dem Held. Upgradebar. -----
const TOWER_TYPES={   // role: melee | ranged | heal. era = ab welcher internen Era baubar (Stufe = era+1). atkR = Wirk-/Heil-Reichweite.
  kaempfer:{name:'Kämpfer-Turm',      unit:'warrior_red',  role:'melee',  era:2, range:240, atkR:44,  atk:7, hp:100, speed:74, cd:0.7,  cost:{holz:140,stein:90}},        // Stufe 3
  bogen:   {name:'Bogenschütze-Turm', unit:'archer_purple',role:'ranged', era:2, range:340, atkR:340, atk:5, hp:60,  speed:64, cd:1.0,  cost:{holz:130,stein:70}},          // Stufe 3
  lance:   {name:'Lanzen-Turm',       unit:'lance_blue',   role:'melee',  era:4, range:260, atkR:80,  atk:9, hp:95,  speed:70, cd:0.95, cost:{holz:200,stein:130,gold:30}},  // Stufe 5 — Reichweiten-Nahkampf
  monk:    {name:'Mönch-Turm',        unit:'monk_blue',    role:'heal',   era:4, range:300, atkR:300, heal:9,hp:75,  speed:66, cd:1.3,  cost:{holz:200,stein:120,gold:40}},  // Stufe 5 — Heiler/Support
};
const TOWER_ORDER=['kaempfer','bogen','lance','monk'];
function hasArmory(s){ return s.builds && s.builds.some(b=>b.type==='waffenkammer'); }
function towersUnlocked(s){ return s.era>=2; }   // Türme ab Stufe 3 (mid:6385/6387)
function towerHp(t){ return Math.round(TOWER_TYPES[t.type].hp*(1+0.4*(t.lvl||0))); }
function towerAtk(t){ const T=TOWER_TYPES[t.type]; return (T.atk||T.heal||5)*(1+0.35*(t.lvl||0)); }   // dient auch als Heil-Stärke beim Mönch
function towerUpCost(t){ const base=TOWER_TYPES[t.type].cost, c={}; for(const k in base) c[k]=Math.round(base[k]*0.55*Math.pow(1.5,t.lvl||0)); return c; }
function spawnTroop(s,t){ const sl=s.towerSlots[t.seg], h=towerHp(t); t.unit={x:sl.x,y:sl.y+24,tx:sl.x,ty:sl.y+24,hp:h,hpmax:h,atkT:0,face:1,animT:rnd(0,2),hurtT:0,moving:false}; }
function towerAt(s,seg){ return s.towers && s.towers.find(t=>t.seg===seg); }
// Freie (nicht zugewiesene) Arbeiter laufen selbstständig los und farmen zufällige Knoten in Dorfnähe (mid:6048).
// Zugewiesene Arbeiter bleiben Boost-Pawns an ihrer Hütte; nur der freie Pool wird als laufende Pawns abgebildet.
function makeWalker(){ const a=rnd(0,6.2832), d=rnd(BASE_SOLID+24,BASE_SOLID+80);
  return {x:BASE.x+Math.cos(a)*d, y:BASE.y+Math.sin(a)*d, tx:BASE.x, ty:BASE.y, carry:0, type:null, state:'seek', target:null}; }
function updateFreeWalkers(s,dt){
  const want=Math.max(0,freeWorkers(s));
  while(s.freeWalkers.length<want) s.freeWalkers.push(makeWalker());
  if(s.freeWalkers.length>want) s.freeWalkers.length=want;          // gerade zugewiesene verschwinden aus dem freien Schwarm
  const range=areaRadius(s)+150, rate=BAL.heroGatherBase*BAL.workerEff, CAP=5;
  for(const w of s.freeWalkers){
    if(w.state==='seek'){
      if(!w.target || w.target.amount<=0.4){                         // ziellos/leer → neuen zufälligen Knoten in Reichweite picken
        const cand=s.nodes.filter(n=>n.amount>0.4 && dist(n.x,n.y,BASE.x,BASE.y)<range);
        w.target = cand.length? cand[Math.floor(rnd(0,cand.length))] : null; }
      if(w.target){ w.tx=w.target.x; w.ty=w.target.y;
        if(dist(w.x,w.y,w.target.x,w.target.y)<HARVEST_R){
          const amt=Math.min(rate*dt, w.target.amount, CAP-w.carry);
          if(amt>0){ w.target.amount-=amt; w.carry+=amt; w.type=w.target.type; }
          if(w.carry>=CAP || w.target.amount<=0.4) w.state='return'; }
      } else { w.tx=BASE.x+(w.x<BASE.x?-50:50); w.ty=BASE.y; }       // nichts in Reichweite → bei der Basis tigern
    } else {                                                          // return: zur Basis, abliefern beim Übertreten der Dorfgrenze
      w.tx=BASE.x; w.ty=BASE.y;
      if(dist(w.x,w.y,BASE.x,BASE.y)<OUTER_R){
        if(w.carry>0&&w.type){ s.store[w.type]=(s.store[w.type]||0)+w.carry; addPop(s,w.x,w.y-18,COL[w.type]||'#fff','+'+Math.floor(w.carry)); }
        w.carry=0; w.type=null; w.state='seek'; w.target=null; } }
    moveToward(w,w.tx,w.ty,onSand(s,w.x,w.y)?66:120,dt);  // Sand bremst auch die Helfer (mid:6060)
  } }

/* ---------- Kampf (Tag-Phase, Test-Bett fürs spätere Nacht-TD) ---------- */
const ENEMY_R=14, HERO_RANGE=72, HERO_ATK_CD=0.55, ENEMY_ATK_CD=1.0;
// Zwei Gegner-Tiers: Grunt = leicht (klein), Brute = schwer (groß, stark) — fürs Era-gating
const ETYPES={
  grunt:{name:'Grunt', unit:'pawn_black',    hp:32, hpEra:10, atk:7,  speed:56, size:92,  atkRange:42, aggro:320, leash:640, bounty:2},
  brute:{name:'Brute', unit:'warrior_black', hp:100,hpEra:30, atk:19, speed:42, size:134, atkRange:60, aggro:470, leash:820, bounty:7},
  // Miniboss ab Gebiet 3 (mid:6159): groß, knapp schaffbar, lohnt sich → schenkt einen Arbeiter
  miniboss:{name:'Anführer', unit:'warrior_black', hp:300, hpEra:70, atk:24, speed:38, size:178, atkRange:70, aggro:560, leash:1000, bounty:0, boss:true},
};
// Entwicklungs-Cap pro Zeitalter (mid:6137): era0=0 (keine Evo am Start) … era4=4. So bleibt jeder Einzelgegner mit voll
// ausgebauten Kampf-Upgrades der Era besiegbar.
function maxEvo(s){ return s.era; }
// Gegner spawnen NICHT näher als dieser Ring ums Dorf (mid:6153); skaliert leicht mit der Map, aber großer Mindest-Puffer
function enemyNoSpawn(s){ return 600; }   // No-Spawn = altes Gebiet 1 / grüner Ring (mid:6159)
// Gegner spawnt an ZUFÄLLIGER, gültiger Position (nicht Wasser/Fels/Dorf, nicht im No-Spawn-Ring), bleibt dort stationär bis Aggro.
function spawnEnemy(s,kind){ const T=ETYPES[kind], R=areaRadius(s), lo=enemyNoSpawn(s);
  for(let t=0;t<40;t++){ const a=rnd(0,6.2832), d=rnd(lo, Math.max(lo+60,R-40)), x=BASE.x+Math.cos(a)*d, y=BASE.y+Math.sin(a)*d;
    if(blocked(s,x,y,18)) continue;
    if(s.enemies.some(e=>dist(x,y,e.x,e.y)<300)) continue;   // Gegner nicht zu nah beieinander spawnen (mid:6125)
    const hp=T.hp+T.hpEra*s.era;
    s.enemies.push({kind,x,y,home:{x,y},hp,max:hp,base:hp,face:-1,animT:rnd(0,2),atkT:rnd(0,1),hurtT:0,state:'idle',moving:false,evo:0,evoT:0}); return true; }
  return false; }
// Gegner zielen auf den NÄCHSTEN aus Held + lebenden Turm-Einheiten (mid:6359)
function enemyTarget(s,e){ let best=s.player, bd=dist(e.x,e.y,s.player.x,s.player.y);
  if(s.towers) for(const t of s.towers){ const u=t.unit; if(u){ const d=dist(e.x,e.y,u.x,u.y); if(d<bd){bd=d;best=u;} } }
  return best; }
// Turm-Einheiten: bewachen ihren Turm per Aggro (Nahkampf/Fernkampf) oder folgen dem Held (mode 'folgen'). Fallen → respawnen am Turm.
function updateTroops(s,dt){ if(!s.towers) return; const P=s.player;
  for(const t of s.towers){
    if(!t.unit){ t.downT=(t.downT||0)-dt; if(t.downT<=0) spawnTroop(s,t); continue; }
    const u=t.unit, TT=TOWER_TYPES[t.type]; u.animT+=dt; if(u.hurtT>0)u.hurtT-=dt; u.atkT=(u.atkT||0)-dt; u.attacking=false;
    const home=(t.mode==='folgen')?{x:P.x,y:P.y}:{x:s.towerSlots[t.seg].x,y:s.towerSlots[t.seg].y+24};
    const goHome=()=>{ if(dist(u.x,u.y,home.x,home.y)>16){ u.moving=true; const dx=home.x-u.x; if(Math.abs(dx)>2)u.face=dx<0?-1:1; moveToward(u,home.x,home.y,TT.speed,dt); collide(s,u,ENEMY_R); } else u.moving=false; };
    if(TT.role==='heal'){   // Mönch: nächsten verwundeten Verbündeten (Held oder Truppe) heilen
      let tgt=null,td=TT.range;
      if(P.hp<P.hpmax){ const d=dist(P.x,P.y,u.x,u.y); if(d<td){td=d;tgt=P;} }
      for(const o of s.towers){ const ou=o.unit; if(ou&&ou!==u&&ou.hp<ou.hpmax){ const d=dist(ou.x,ou.y,u.x,u.y); if(d<td){td=d;tgt=ou;} } }
      if(tgt){ const dx=tgt.x-u.x; if(Math.abs(dx)>2)u.face=dx<0?-1:1;
        if(td>TT.atkR){ u.moving=true; moveToward(u,tgt.x,tgt.y,TT.speed,dt); collide(s,u,ENEMY_R); }
        else { u.moving=false; u.attacking=true; if(u.atkT<=0){ u.atkT=TT.cd; const h=Math.round(towerAtk(t)); tgt.hp=Math.min(tgt.hpmax,tgt.hp+h); addFx(s,'heal',tgt.x,tgt.y-18,42); addPop(s,tgt.x,tgt.y-44,'#7dffa0','+'+h); } } }
      else goHome();
    } else {   // Kämpfer/Lanze (Nahkampf) + Bogenschütze (Fernkampf): nächsten Gegner angreifen
      let tgt=null,td=TT.range; for(const e of s.enemies){ if(e.dead)continue; const d=dist(e.x,e.y,u.x,u.y); if(d<td){td=d;tgt=e;} }
      if(tgt){ const dx=tgt.x-u.x; if(Math.abs(dx)>2)u.face=dx<0?-1:1;
        if(TT.role==='ranged'){
          if(td<TT.range*0.55){ u.moving=true; moveToward(u,u.x*2-tgt.x,u.y*2-tgt.y,TT.speed*0.8,dt); collide(s,u,ENEMY_R); } else u.moving=false;
          u.attacking=true; if(u.atkT<=0){ u.atkT=TT.cd; const dmg=Math.round(towerAtk(t)); tgt.hp-=dmg; tgt.hurtT=0.15;
            (s.shots=s.shots||[]).push({x1:u.x,y1:u.y-12,x2:tgt.x,y2:tgt.y-12,age:0}); addPop(s,tgt.x,tgt.y-40,'#bfe9ff','-'+dmg); SFX.hit(); }
        } else {   // Nahkampf (Reichweite via atkR — Lanze sticht weiter)
          if(td>TT.atkR){ u.moving=true; moveToward(u,tgt.x,tgt.y,TT.speed,dt); collide(s,u,ENEMY_R); }
          else { u.moving=false; u.attacking=true; if(u.atkT<=0){ u.atkT=TT.cd; const dmg=Math.round(towerAtk(t)); tgt.hp-=dmg; tgt.hurtT=0.18; addPop(s,tgt.x,tgt.y-40,'#bfe9ff','-'+dmg); burst(s,tgt.x,tgt.y-10,'#bfe9ff',4); SFX.hit(); } }
        }
      } else goHome();
    }
    if(u.hp<=0){ burst(s,u.x,u.y-10,'#88aaff',12); addFx(s,'dust',u.x,u.y-4,60); t.unit=null; t.downT=8; }
  }
  if(s.shots){ for(const sh of s.shots) sh.age+=dt; s.shots=s.shots.filter(sh=>sh.age<0.16); }
}
function updateCombat(s,dt){ const P=s.player; P.attacking=false;
  if(P.hurtT>0)P.hurtT-=dt; P.atkT=(P.atkT||0)-dt; if(P.invT>0)P.invT-=dt;
  // Heilung NUR im Dorf (mid:6124, Kombi A+B): außerhalb keine Regeneration; im Dorf Heil-Funke
  if(dist(P.x,P.y,BASE.x,BASE.y)<OUTER_R && P.hp<P.hpmax){ P.hp=Math.min(P.hpmax,P.hp+14*dt);
    P.healT=(P.healT||0)-dt; if(P.healT<=0){ P.healT=0.55; addFx(s,'heal',P.x,P.y-18,44); } }
  // eingesammelte Drop-Säcke (vom Tod) wieder aufnehmen
  for(const d of s.drops){ if(dist(P.x,P.y,d.x,d.y)<HARVEST_R+8){ let tot=0; ALL.forEach(k=>{ s.store[k]=(s.store[k]||0)+(d.carry[k]||0); tot+=d.carry[k]||0; });
    addPop(s,d.x,d.y-20,'#fff','+'+Math.floor(tot)); burst(s,d.x,d.y-8,'#ffe9a8',8); SFX.deposit(); d.got=true; } }
  s.drops=s.drops.filter(d=>!d.got);
  // Außenposten-Sammler (mid:6246): sammeln ihre Ressource über Zeit bis Cap; Held holt sie ab (direkt ins Lager) sobald er nah genug ist
  if(s.outposts) for(const o of s.outposts){ o.store=Math.min(outpostCap(o),(o.store||0)+outpostRate(o)*dt);
    if(o.store>=1 && dist(P.x,P.y,o.x,o.y)<HARVEST_R+14){ const res=OUTPOST_TYPES[o.type].res, amt=Math.floor(o.store);
      s.store[res]=(s.store[res]||0)+amt; o.store-=amt; addPop(s,o.x,o.y-30,'#fff','+'+amt+' '+NAME[res]); burst(s,o.x,o.y-8,'#ffe9a8',8); SFX.deposit(); } }
  // Bestände skalieren mit der MAP-Größe (areas): Grunts ab Start (auch era0), Brutes erst ab Dorf-Era (mid:6108)
  if(s.phase!=='night') { s.spawnT+=dt;   // langsam+sequenziell; Cap skaliert mit Map-Größe (mid:6233/6242): Gebiet 1-4 → 10/15/20/25 (Floor 10, sonst trifft man zu selten einen). Bei Nacht ruht der Tag-Spawner.
    const CAP=5+((s.areas||1))*5;
    if(s.enemies.length<CAP && s.spawnT>7){ s.spawnT=0;
      const nb=s.enemies.filter(e=>e.kind==='brute').length, nboss=s.enemies.filter(e=>e.kind==='miniboss').length;
      let kind='grunt';
      if(s.areas>=3 && nboss<1 && Math.random()<0.45) kind='miniboss';       // genau 1 Anführer auf der Karte
      else if(s.era>=1 && nb<2 && Math.random()<0.4) kind='brute';           // Brutes seltener (max 2)
      spawnEnemy(s,kind); } }
  for(const e of s.enemies){ const T=ETYPES[e.kind]; e.animT+=dt; if(e.hurtT>0)e.hurtT-=dt;
    // Entwicklung: je länger ein Mob lebt, desto stärker (HP+Schaden), Cap pro Zeitalter (mid:6137/6138) — wird zum „dicken Klopper"
    e.evoT+=dt; if(e.evoT>11 && e.evo<maxEvo(s)){ e.evoT=0; e.evo++; const old=e.max; e.max=Math.round(e.base*(1+0.28*e.evo)); e.hp+=e.max-old;
      burst(s,e.x,e.y-T.size*0.4,'#c0392b',10); addPop(s,e.x,e.y-T.size*0.6,'#ff8a4a','⬆ Stufe '+e.evo); }
    const tg=enemyTarget(s,e), isP=(tg===P), dP=dist(e.x,e.y,tg.x,tg.y);   // Ziel: Held oder nächste Turm-Einheit (mid:6359)
    if(e.state==='idle'){ e.moving=false; if(dP<T.aggro) e.state='chase'; }                         // stationär bis Aggro
    else if(e.state==='chase'){
      if(!e.night && dP>T.leash) e.state='return';   // Nacht-Welle gibt nicht auf (mid:6396)
      else if(dP>T.atkRange){ const dx=tg.x-e.x; if(Math.abs(dx)>2)e.face=dx<0?-1:1; e.moving=true;
        moveToward(e,tg.x,tg.y, onSand(s,e.x,e.y)?T.speed*0.55:T.speed, dt); collide(s,e,ENEMY_R); }   // jagt Ziel
      else { e.moving=false; e.atkT-=dt; if(e.atkT<=0 && !(isP&&P.invT>0)){ e.atkT=ENEMY_ATK_CD;
        const dmg=Math.max(1,Math.round(T.atk*(1+0.15*e.evo)-(isP?(s.def||0):0))); tg.hp-=dmg; tg.hurtT=0.25;
        if(isP){ addPop(s,P.x,P.y-62,'#ff6a6a','-'+dmg); SFX.hurt(); } else addPop(s,tg.x,tg.y-44,'#ff9a6a','-'+dmg); } } }
    else { const dx=e.home.x-e.x; if(Math.abs(dx)>2)e.face=dx<0?-1:1; e.moving=true;                // zurück zum Spawn-Punkt
      moveToward(e,e.home.x,e.home.y, onSand(s,e.x,e.y)?T.speed*0.55:T.speed, dt); collide(s,e,ENEMY_R);
      if(dP<T.aggro) e.state='chase'; else if(dist(e.x,e.y,e.home.x,e.home.y)<10) e.state='idle'; } }
  // Held greift automatisch den nächsten Gegner in Reichweite an
  let near=null,nd=HERO_RANGE; for(const e of s.enemies){ if(e.dead)continue; const dd=dist(e.x,e.y,P.x,P.y); if(dd<nd){nd=dd;near=e;} }
  if(near){ P.attacking=true; const dx=near.x-P.x; if(Math.abs(dx)>2)P.face=dx<0?-1:1;
    if(P.atkT<=0){ P.atkT=HERO_ATK_CD; const dmg=Math.round(8*(s.atk||1)); near.hp-=dmg; near.hurtT=0.18;
      addPop(s,near.x,near.y-42,'#ffe08a','-'+dmg); burst(s,near.x,near.y-10,'#ffd86b',5); SFX.hit(); } }
  // Tod: besiegt → Effekt + Gold-Beute; abgelaufen (poof) → leise verschwinden
  for(const e of s.enemies){ if(e.hp<=0 && !e.dead){ e.dead=true; const T=ETYPES[e.kind]; burst(s,e.x,e.y-10,'#c0392b',16); SFX.enemyDie();
      if(T.boss){   // Miniboss-Belohnung: ein Arbeiter geschenkt + etwas Gold (mid:6159)
        s.workerPool=(s.workerPool||0)+1; s.store.gold=(s.store.gold||0)+15+s.era*5;
        addPop(s,e.x,e.y-44,'#9fe0ff','Anführer besiegt! +1 Arbeiter'); burst(s,e.x,e.y-12,'#9fe0ff',24); SFX.era(); say('Anführer besiegt — ein Arbeiter schließt sich dir an!'); }
      else {   // Beute: zufällige Ressource ~1-3 Stufen unter dem aktuellen Zeitalter, Menge je Gegner-Typ (mid:6126)
        const lo=Math.max(0,s.era-3), hi=Math.max(0,s.era-1), cands=RES.filter(r=>r.unlock>=lo&&r.unlock<=hi);
        const rk=cands.length?cands[Math.floor(rnd(0,cands.length))].key:'holz', amt=T.bounty+Math.floor(rnd(0,2));
        s.store[rk]=(s.store[rk]||0)+amt; addPop(s,e.x,e.y-34,COL[rk]||'#fff','+'+amt+' '+NAME[rk]); SFX.deposit(); } }
    else if(e.poof){ burst(s,e.x,e.y-10,'rgba(150,150,170,.8)',8); } }
  s.enemies=s.enemies.filter(e=>!e.dead);
  if(s.phase==='night' && !s.enemies.some(e=>e.night)){   // Nacht überstanden → Aufstiegs-Kredit (mid:6396)
    s.phase='day'; s.nightToken=true; const rw=30+s.era*15; s.store.gold=(s.store.gold||0)+rw;
    addPop(s,BASE.x,BASE.y-52,'#ffe08a','Nacht überstanden! +'+rw+' Gold'); burst(s,BASE.x,BASE.y-20,'#a05bff',28); SFX.era();
    say('🌅 Nacht überstanden! Du kannst jetzt aufsteigen.'); saveGame(s); }
  if(P.hp<=0 && P.invT<=0){                                    // Tod (Option A): Sack fällt, Respawn an Basis, kurz unverwundbar
    addFx(s,'dust',P.x,P.y-4,84);
    if(carryTotal(P.carry)>0.4){ const c={}; ALL.forEach(k=>{ c[k]=P.carry[k]; P.carry[k]=0; }); s.drops.push({x:P.x,y:P.y,carry:c}); }
    P.hp=P.hpmax; P.x=P.tx=BASE.x; P.y=P.ty=BASE.y+BASE_SOLID+30; P.invT=2.5;
    for(const e of s.enemies) e.state='return';               // Gegner ziehen sich zurück (Atempause statt Wave-Wipe)
    burst(s,BASE.x,BASE.y-20,'#ff5a5a',16); say('Niedergeschlagen! Dein getragener Sack ist gefallen — hol ihn dir zurück.'); } }

const FX={}; ['dust','heal'].forEach(k=>{ const i=new Image(); i.src='ts/u/fx_'+k+'.png'; FX[k]=i; });
const FXFPS={dust:18, heal:15};
function addFx(s,kind,x,y,size){ if(!s.fx)s.fx=[]; const im=FX[kind], fr=im.naturalHeight?Math.max(1,Math.round(im.naturalWidth/im.naturalHeight)):8;

function drawFx(s){ for(const e of s.fx){ const im=FX[e.kind]; if(!im.complete||!im.naturalWidth)continue;

const BIOME_CYCLE=['wald','gebirge','felder'];
// Biom an einer Weltposition: 6 Sektoren um die Basis, mit leicht organisch gewellten Grenzen
function biomeAt(s,x,y){ const N=(s.biomes&&s.biomes.length)||6, dx=x-BASE.x, dy=y-BASE.y;
  let a=Math.atan2(dy,dx)-(s.biomeRot||0)+0.30*Math.sin(Math.hypot(dx,dy)/260+(s.biomeWarp||0))+0.20*Math.sin(x/200+0.6*(s.biomeWarp||0))*Math.cos(y/190);  // organisch gewellte + leicht durcheinander gehende Grenzen statt scharfer Sektoren (mid:6203)
  a=((a%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  return s.biomes? s.biomes[Math.floor(a/(2*Math.PI)*N)%N] : 'wald'; }
// gewichtete Ressourcen-Wahl aus der Biom-Tabelle, gefiltert nach freigeschalteten Zeitaltern
function weightedFromTable(table, allowed){ const keys=Object.keys(table).filter(k=>allowed.includes(k));
  if(!keys.length) return null; let tot=0; for(const k of keys) tot+=table[k]; let r=Math.random()*tot;
  for(const k of keys){ r-=table[k]; if(r<=0) return k; } return keys[keys.length-1]; }

function resolve(o,cx,cy,R){ const d=dist(o.x,o.y,cx,cy); if(d<R){ if(d<0.01){o.x=cx+R;return;} o.x=cx+(o.x-cx)/d*R; o.y=cy+(o.y-cy)/d*R; } }
function collide(s,o,r){ resolve(o,BASE.x,BASE.y,BASE_SOLID+r); for(const ob of s.obstacles) resolve(o,ob.x,ob.y,ob.r+r);

// organischer Blob-Pfad (Sand-Flächen) auf dem GLOBALEN ctx — fürs pro-Frame-Terrain (mid:6182, kein Riesen-Canvas mehr → Karte beliebig groß)
function blobPathCtx(B,scale){ const N=B.pts.length;
  const pt=i=>{ const a=i/N*6.2832, rr=B.r*B.pts[((i%N)+N)%N]*scale; return [B.x+Math.cos(a)*rr, B.y+Math.sin(a)*rr*0.92]; };
  ctx.beginPath(); const p0=pt(N-1), p1=pt(0); ctx.moveTo((p0[0]+p1[0])/2,(p0[1]+p1[1])/2);
  for(let i=0;i<N;i++){ const c=pt(i), nx=pt(i+1); ctx.quadraticCurveTo(c[0],c[1],(c[0]+nx[0])/2,(c[1]+nx[1])/2); } ctx.closePath(); }

function setRing(s){ s.pois=[]; const RR=VILLAGE_R; for(let i=0;i<6;i++){ const a=i/6*6.2832-Math.PI/2; s.pois.push({x:BASE.x+Math.cos(a)*RR,y:BASE.y+Math.sin(a)*RR}); } }
function organicBlob(x,y,r){ const pts=[]; for(let i=0;i<11;i++) pts.push(rnd(0.62,1.28)); return {x,y,r,pts}; }
function buildLevel(s){

  // Seen + Sand über die GANZE später erschliessbare Karte verteilen (nicht nur das Start-Gebiet) — mid:6060.
  // Wasser = solides Hindernis (unbetretbar, r*0.9); Sand bremst (siehe onSand im step).
  const FULLR=2400+3*2400;  // Gebiet 4 = 9600
  s.lakes=[]; const lakeN=8+Math.floor(rnd(0,4));   // Inland-Seen (mid:6213/6224/6226) — 8-11, ein paar mehr (Flüsse gestrichen)
  for(let i=0;i<lakeN;i++){ const r=rnd(150,250); let x,y,t=0,ok=false;
    do{ const a=rnd(0,6.2832), d=rnd(Math.max(VILLAGE_R+r*1.3+70, 650+r), FULLR+140); x=BASE.x+Math.cos(a)*d; y=BASE.y+Math.sin(a)*d; t++;   // großer Mindestabstand: Wasser ragt nicht ins Dorf (mid:6224)
        ok = x>r+50&&x<WORLD-r-50&&y>r+50&&y<WORLD-r-50 && !s.lakes.some(L=>dist(x,y,L.x,L.y)<L.r+r+120);
    } while(!ok && t<40); if(!ok) continue;
    const L=organicBlob(x,y,r); s.lakes.push(L); s.obstacles.push({x:L.x,y:L.y,r:L.r*0.9}); }
  // Sand-Flächen: Strände an den Seen + frei verstreut über die ganze Karte
  s.sand=[];
  for(const L of s.lakes){ const a=rnd(0,6.2832); s.sand.push(organicBlob(L.x+Math.cos(a)*L.r*0.95, L.y+Math.sin(a)*L.r*0.95, rnd(120,190))); }
  for(let i=0;i<26;i++){ const r=rnd(120,240), a=rnd(0,6.2832), d=rnd(VILLAGE_R+r*1.1+50, FULLR-r); s.sand.push(organicBlob(BASE.x+Math.cos(a)*d, BASE.y+Math.sin(a)*d, r)); }
  const inLake=(x,y,m)=>s.lakes.some(L=>dist(x,y,L.x,L.y)<L.r+m);

  // 12 Turm-Bauplätze im äußeren Ring-Band (zwischen innerem Rad und äußerem Ring) — Tag/Nacht-TD (mid:6171)
  s.towerSlots=[]; for(let i=0;i<TOWER_N;i++){ const a=(i+0.5)/TOWER_N*6.2832-Math.PI/2; s.towerSlots.push({x:BASE.x+Math.cos(a)*TOWER_RAD,y:BASE.y+Math.sin(a)*TOWER_RAD,tower:null}); }
  // Dorf-Leben: nur Schafe (Deko-Hütten raus — Häuser kommen als Produktionsgebäude pro Zeitalter)
  s.village=[];
  for(let i=0;i<4;i++){ const a=rnd(0,6.28),d=rnd(60,VILLAGE_R-95); s.village.push({key:'sheep',x:BASE.x+Math.cos(a)*d,y:BASE.y+Math.sin(a)*d,size:32,wob:rnd(0,6.28)}); }
  s.deco=[];
  // Deko in NATÜRLICHEN KLUMPEN statt gleichmäßigem Streuen (mid:6229): Wäldchen mit großen Bäumen eng zusammen,
  // Felsfelder (viele Brocken + ein paar große solide), Wiesen offener mit Kürbissen/Pilzen. → volle, „gebaute" Karte.
  const placeD=(key,x,y,size,solid,obR)=>{ if(dist(x,y,BASE.x,BASE.y)<OUTER_R+22||inLake(x,y,26)||onSand(s,x,y)||blocked(s,x,y,16)) return;   // Deko: nicht im Dorf-Ring, nicht auf Wasser/Sand (mid:6258/6260)

  for(let i=0;i<NCL;i++){ const a=rnd(0,6.2832), d=Math.sqrt(Math.random())*FULLR, cx=BASE.x+Math.cos(a)*d, cy=BASE.y+Math.sin(a)*d;

      clump(cx,cy, 8+Math.floor(rnd(0,10)), rnd(80,190), (x,y)=> placeD('holz',x,y,rnd(82,132),false));

    } else if(bk==='gebirge'){  // Felsfeld: viele kleine/mittlere Brocken (Deko) + 1-2 große solide Felsen
      clump(cx,cy, 5+Math.floor(rnd(0,7)), rnd(60,160), (x,y)=> placeD('deco_rock',x,y,rnd(34,58),false));
      clump(cx,cy, 1+Math.floor(rnd(0,2)), rnd(40,110), (x,y)=> placeD('deco_rock',x,y,rnd(72,104),true));
      clump(cx,cy, 0+Math.floor(rnd(0,2)), rnd(60,130), (x,y)=> placeD('deco_bush',x,y,rnd(20,30),false));
    } else {                    // Wiesen: offener — Kürbisse + Pilze + Büschel in lockeren Tupfern, vereinzelt ein Baum
      clump(cx,cy, 3+Math.floor(rnd(0,5)), rnd(80,180), (x,y)=>{ const r=Math.random(); placeD(r<0.4?'deco_pumpkin':(r<0.78?'deco_mushroom':'deco_bush'),x,y,rnd(24,36),false); });
      if(Math.random()<0.45) clump(cx,cy, 1+Math.floor(rnd(0,3)), rnd(50,130), (x,y)=> placeD('holz',x,y,rnd(74,108),false));
    }
  }
  // Wasser-Felsen als Ozean-Deko (immer im Wasser jenseits des Maximalausbaus FULLR)
  s.waterRocks=[]; const maxR=2400+3*2400;
  for(let i=0;i<26;i++){ const a=rnd(0,6.2832), d=rnd(maxR+120, maxR+900); s.waterRocks.push({x:BASE.x+Math.cos(a)*d, y:BASE.y+Math.sin(a)*d, kind:Math.random()<0.5?'env_waterrock1':'env_waterrock3', t:rnd(0,2)}); }
}

function tone(freq,dur,type,vol,delay){ if(!actx||muted) return; const t=actx.currentTime+(delay||0);
  const o=actx.createOscillator(), g=actx.createGain(); o.type=type||'sine'; o.frequency.value=freq;
  o.connect(g); g.connect(actx.destination); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(Math.min(0.9,(vol||0.12)*SFXVOL),t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.03); }
// Rausch-Burst (für Treffer/Bauen/Whoosh) + Pitch-Sweep — beide respektieren muted + SFXVOL (mid:6308)
function noise(dur,vol,cutoff){ if(!actx||muted) return; const t=actx.currentTime, n=Math.max(1,Math.floor(actx.sampleRate*dur));
  const buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0); for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
  const src=actx.createBufferSource(); src.buffer=buf; const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cutoff||1800;
  const g=actx.createGain(); src.connect(f); f.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(Math.min(0.9,(vol||0.1)*SFXVOL),t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); src.start(t); src.stop(t+dur+0.02); }
function sweep(f0,f1,dur,type,vol){ if(!actx||muted) return; const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  o.connect(g); g.connect(actx.destination); const V=Math.min(0.9,(vol||0.1)*SFXVOL);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(V,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.03); }

  expand:()=>{ sweep(320,880,0.45,'sine',0.08); tone(659,0.25,'sine',0.05,0.12); },                              // aufsteigender Whoosh (Gebiet)
  era:()=>[523,659,784,1047].forEach((f,i)=>tone(f,0.22,'sine',0.10,i*0.10)),                                    // Zeitalter-Fanfare

  hit:()=>{ noise(0.06,0.13,2800); tone(200,0.05,'square',0.08); },                                              // Schwert-Treffer

// ----- Entspannte Hintergrundmusik (mid:6284/6304): rotierende Playlist aus CC0-Tracks (OpenGameArt, gemeinfrei) — ruhig/mittelalterlich. Sehr leise, per Mute-Button steuerbar. -----
const BGM_TRACKS=['ts/bgm.mp3','ts/bgm2.mp3','ts/bgm3.mp3'];   // The Old Tower Inn / A New Town / The Bard's Tale
// Shuffle-Endless mit Fade in/out (mid:6371). Android blockt das <audio>-Element trotz funktionierendem AudioContext (SFX gehen) → Musik dort ÜBER den AudioContext routen; iOS bleibt auf dem direkten Element (läuft dort, nicht anfassen) (mid:6373/6377).
let bgm=null, bgmWanted=false, bgmIdx=0, bgmGain=null, bgmRouted=false, bgmFade=null; const BGM_VOL=0.03;
const IS_IOS=/iPad|iPhone|iPod/.test((navigator.userAgent||'')) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
function nextBgmIdx(){ if(BGM_TRACKS.length<2) return 0; let i; do{ i=Math.floor(Math.random()*BGM_TRACKS.length); }while(i===bgmIdx); return i; }
function routeBgm(){ if(bgmRouted||IS_IOS||!actx||!bgm) return; try{ const src=actx.createMediaElementSource(bgm); bgmGain=actx.createGain(); bgmGain.gain.value=0.0001; src.connect(bgmGain); bgmGain.connect(actx.destination); bgm.volume=1; bgmRouted=true; }catch(e){} }
function bgmFadeTo(target,dur){ if(bgmRouted&&bgmGain&&actx){ const t=actx.currentTime; bgmGain.gain.cancelScheduledValues(t); bgmGain.gain.setValueAtTime(Math.max(0.0001,bgmGain.gain.value),t); bgmGain.gain.linearRampToValueAtTime(Math.max(0.0001,target),t+dur); return; }
  if(!bgm) return; if(bgmFade)clearInterval(bgmFade); const v0=bgm.volume, steps=Math.max(1,Math.round(dur/0.05)); let k=0;   // iOS/Fallback: Element-Lautstärke rampen
  bgmFade=setInterval(()=>{ k++; bgm.volume=Math.max(0,Math.min(1,v0+(target-v0)*(k/steps))); if(k>=steps){ clearInterval(bgmFade); bgmFade=null; } },50); }
function curVol(){ return bgmRouted&&bgmGain?bgmGain.gain.value:(bgm?bgm.volume:0); }
function playBgmTrack(i){ if(!bgm) return; bgmIdx=i; bgm.src=BGM_TRACKS[i]; if(!bgmRouted) bgm.volume=0; if(bgmWanted&&!muted){ const p=bgm.play(); if(p&&p.catch)p.catch(()=>{}); bgmFadeTo(BGM_VOL,1.4); } }
function initMusic(){ if(bgm) return; try{ bgmIdx=Math.floor(Math.random()*BGM_TRACKS.length); bgm=new Audio(BGM_TRACKS[bgmIdx]); bgm.loop=false; bgm.volume=0;
  bgm.addEventListener('timeupdate',()=>{ if(bgm.duration && (bgm.duration-bgm.currentTime)<1.4 && curVol()>0.004) bgmFadeTo(0,1.2); });   // Fade-out kurz vorm Track-Ende
  bgm.addEventListener('ended',()=>{ setTimeout(()=>{ if(bgmWanted&&!muted) playBgmTrack(nextBgmIdx()); }, 700); });   // kurze Pause, dann shuffle-next mit Fade-in
  bgm.addEventListener('error',()=>{ setTimeout(()=>{ if(bgmWanted&&!muted) playBgmTrack(nextBgmIdx()); }, 400); }); }catch(e){} }   // Track lädt nicht (404 o.ä.) → nächsten versuchen statt stumm bleiben (mid:6419)
function startMusic(){ initMusic(); routeBgm(); bgmWanted=true; if(bgm && !muted){ const p=bgm.play(); if(p&&p.catch)p.catch(()=>{}); bgmFadeTo(BGM_VOL,1.4); } }
function updateMusic(){ if(!bgm) return; if(muted){ if(!bgm.paused) bgm.pause(); } else if(bgmWanted && bgm.paused){ const p=bgm.play(); if(p&&p.catch)p.catch(()=>{}); bgmFadeTo(BGM_VOL,1.0); } }

  s.phase='day';   // laufende Nacht beim Laden abbrechen (Nacht-Gegner werden nicht persistiert) — Token bleibt erhalten

  if(Array.isArray(d.achieved)) s.achieved=d.achieved.slice();

  if(Array.isArray(d.outposts)) s.outposts=d.outposts.filter(o=>OUTPOST_TYPES[o.type]).map(o=>({type:o.type,x:o.x,y:o.y,store:o.store||0,tempoLvl:o.tempoLvl||0,mengeLvl:o.mengeLvl||0}));
  setRing(s);
  s.nodes=[]; const n=70+s.areas*65; for(let i=0;i<n;i++) spawnNode(s);  // deutlich mehr Knoten (mid:6098/6260)

// Offline-Ertrag: Auto-Producer voll, Helfer grob geschätzt (reduziert), gedeckelt
function applyOffline(s, elapsedSec){ const t=Math.min(Math.max(0,elapsedSec), OFFLINE_CAP); if(t<30) return null;
  const before={}; ALL.forEach(k=>before[k]=s.store[k]||0);
  // Konverter brauchen Input → in groben Schritten simulieren statt 1 Riesen-Tick (sonst Input-Deckel falsch)
  const steps=Math.min(240, Math.max(1, Math.round(t/30))), sdt=t/steps;
  for(let i=0;i<steps;i++) for(const b of s.builds) produce(s,b,sdt);
  const g={}; ALL.forEach(k=>{ const d=Math.floor((s.store[k]||0)-before[k]); if(d>0) g[NAME[k]]=d; });
  const mins=Math.round(t/60); const parts=Object.entries(g).map(([k,v])=>`+${v} ${k}`);
  return parts.length? {mins, txt:parts.join(', ')} : null; }

      const tMax=b.tempo>=mxL, gMax=b.menge>=mxL, wMax=b.workers>=mxW;

      set('tempo','era1',`Tempo Lvl ${b.tempo}/${mxL}`, tMax?'Max für diese Stufe — erst aufsteigen':`${flow} (jetzt ${buildRate(s,b).toFixed(2)}/s)`, tMax?'':'⤷ '+costStr(ct), tMax||!canAfford(s,ct));
      set('menge',T.res,`Menge Lvl ${b.menge}/${mxL}`, gMax?'Max für diese Stufe — erst aufsteigen':'Mehr Ertrag pro Zyklus', gMax?'':'⤷ '+costStr(cm), gMax||!canAfford(s,cm));
      set('assignAdd','worker',`Arbeiter zuweisen (${b.workers}/${mxW})`, wMax?'Hütte voll für diese Stufe':`+50% Output je Arbeiter`, wMax?'':'Frei im Pool: '+freeWorkers(s), wMax||freeWorkers(s)<=0);
      set('assignRem','worker','Arbeiter abziehen','zurück in den Pool der Burg','',b.workers<=0);
      return;
    }
    if(typeof this.panelFor==='string' && this.panelFor.slice(0,2)==='op'){   // AUSSENPOSTEN-Panel refresh
      const o=s.outposts&&s.outposts[+this.panelFor.slice(2)]; if(!o) return; const T=OUTPOST_TYPES[o.type], mxL=buildMaxLvl(s);
      const ct=outpostUpCost(o,'tempo',s), cm=outpostUpCost(o,'menge',s), tMax=(o.tempoLvl||0)>=mxL, mMax=(o.mengeLvl||0)>=mxL;
      set('optempo','era1',`Tempo Lvl ${o.tempoLvl||0}/${mxL}`, tMax?'Max für diese Stufe — erst aufsteigen':`sammelt ${NAME[T.res]} (jetzt ${outpostRate(o).toFixed(2)}/s)`, tMax?'':'⤷ '+costStr(ct), tMax||!canAfford(s,ct));
      set('opmenge',T.res,`Cap Lvl ${o.mengeLvl||0}/${mxL}`, mMax?'Max für diese Stufe — erst aufsteigen':`mehr Lager (jetzt ${outpostCap(o)} ${NAME[T.res]})`, mMax?'':'⤷ '+costStr(cm), mMax||!canAfford(s,cm));
      return;
    }
    if(typeof this.panelFor==='string' && this.panelFor.slice(0,2)==='tb'){   // TURM-BAU-MENÜ refresh (4 Typen, stufen-gated)
      const ICON={kaempfer:'stein',bogen:'kristall',lance:'holz',monk:'korn'};
      for(const tt of TOWER_ORDER){ const T=TOWER_TYPES[tt], locked=s.era<T.era, c=T.cost;
        const role=T.role==='heal'?'Heiler/Support':T.role==='ranged'?'Fernkampf':(tt==='lance'?'Reichweiten-Nahkampf':'Nahkampf');
        set('tb_'+tt, ICON[tt]||'stein', T.name, locked?('Ab Stufe '+(T.era+1)):role, locked?'':'⤷ '+costStr(c), locked||!canAfford(s,c)); }
      return;
    }
    if(typeof this.panelFor==='string' && this.panelFor.slice(0,2)==='tw'){   // TURM-PANEL refresh
      const tw=towerAt(s,+this.panelFor.slice(2)); if(!tw) return; const c=towerUpCost(tw), mx=(tw.lvl||0)>=buildMaxLvl(s);
      const pw=TOWER_TYPES[tw.type].role==='heal'?'Heilung':'Schaden';
      set('tw_up','era1',`Einheit aufrüsten (Lvl ${tw.lvl||0}/${buildMaxLvl(s)})`, mx?'Max für diese Stufe — erst aufsteigen':`+HP & +${pw} (HP ${towerHp(tw)}, ${pw} ${towerAtk(tw).toFixed(0)})`, mx?'':'⤷ '+costStr(c), mx||!canAfford(s,c));
      set('tw_mode','worker', tw.mode==='folgen'?'Modus: Folgen':'Modus: Wache', tw.mode==='folgen'?'Einheit folgt dir in den Kampf':'Einheit bewacht ihren Turm (Aggro)','',false);
      return;
    }
    const list=this.tab==='held'?UP_HELD:this.tab==='kampf'?UP_KAMPF:UP_DORF;
    for(const up of list){ const el=this.btns[up.id]; if(!el)continue;
      if(up.show&&!up.show(s)){ el.style.display='none'; continue; }
      if(up.lvl){ const atMax=up.lvl(s)>=heroMaxLvl(s); const c=up.cost(s);
        set(up.id,up.icon,`${up.name(s)} (Lvl ${up.lvl(s)}/${heroMaxLvl(s)})`, atMax?'Max für diese Stufe — erst aufsteigen':up.desc(s), atMax?'':'⤷ '+costStr(c), atMax||!canAfford(s,c)); }
      else { const c=up.cost(s); set(up.id,up.icon,up.name(s),up.desc(s),'⤷ '+costStr(c),!canAfford(s,c)); } }
    const nb=this.btns.nacht;   // 🌙 Nacht-Button: nur sichtbar wenn Nacht ansteht oder läuft (mid:6396)
    if(nb){ if(nightActive(s)){ const left=s.enemies.filter(e=>e.night).length; set('nacht','era4','🌙 Nacht läuft','Schlag die Welle zurück','Gegner übrig: '+left,true); }
      else if(nightPending(s)) set('nacht','era4','🌙 Nacht starten','Überstehe die Welle, um aufzusteigen','Tippen zum Starten',false);
      else nb.style.display='none'; }
    const eb=this.btns.era; if(!eb) return; const next=s.era+1;
    if(next<ERAS.length){ const ec=eraCost(next); const gate=nightGated(next)&&!s.nightToken;
      set('era','era'+Math.min(4,next),'Aufstieg → '+ERAS[next].name,gate?'🌙 Erst eine Nacht überstehen':'',(canAfford(s,ec)?'⤷ ':'⤷ fehlt: ')+costStr(ec),!canAfford(s,ec)||gate||nightActive(s)); }
    else set('era','era4','Stufe 7 erreicht','','Maximum erreicht.',true); },
  upgBuild(kind){ const s=this.s,b=s.builds[this.panelFor]; if(!b)return;
    if(b[kind]>=buildMaxLvl(s)){ say('Max für diese Stufe erreicht — erst aufsteigen.'); return; }
    const c=buildUpCost(b,kind,s);
    if(!canAfford(s,c)){ say('Dafür fehlen noch Ressourcen.'); return; } pay(s,c); b[kind]++; SFX.buy(); this.updateShop(); saveGame(s); },
  upgOutpost(kind){ const s=this.s, o=s.outposts&&s.outposts[+this.panelFor.slice(2)]; if(!o)return;
    const lk=kind==='tempo'?'tempoLvl':'mengeLvl'; if((o[lk]||0)>=buildMaxLvl(s)){ say('Max für diese Stufe erreicht — erst aufsteigen.'); return; }
    const c=outpostUpCost(o,kind,s); if(!canAfford(s,c)){ say('Dafür fehlen noch Ressourcen.'); return; } pay(s,c); o[lk]=(o[lk]||0)+1; SFX.buy(); this.updateShop(); saveGame(s); },
  buildTower(type){ const s=this.s; if(typeof this.panelFor!=='string'||this.panelFor.slice(0,2)!=='tb')return; const seg=+this.panelFor.slice(2);
    if(towerAt(s,seg))return; if(s.era<TOWER_TYPES[type].era){ say(TOWER_TYPES[type].name+' erst ab Stufe '+(TOWER_TYPES[type].era+1)); return; }
    const c=TOWER_TYPES[type].cost; if(!canAfford(s,c)){ say('Dafür fehlen noch Ressourcen.'); return; }
    pay(s,c); if(!s.towers)s.towers=[]; const t={seg,type,lvl:0,mode:'wache',downT:0}; spawnTroop(s,t); s.towers.push(t);
    SFX.build(); say(TOWER_TYPES[type].name+' gebaut! Antippen für Aufrüsten/Modus.'); this.openPanelFor('tw'+seg); saveGame(s); },
  upgTower(){ const s=this.s, tw=towerAt(s,+this.panelFor.slice(2)); if(!tw)return; if((tw.lvl||0)>=buildMaxLvl(s)){ say('Max für diese Stufe erreicht — erst aufsteigen.'); return; }
    const c=towerUpCost(tw); if(!canAfford(s,c)){ say('Dafür fehlen noch Ressourcen.'); return; } pay(s,c); tw.lvl=(tw.lvl||0)+1; if(tw.unit){ const h=towerHp(tw); tw.unit.hpmax=h; tw.unit.hp=h; } SFX.buy(); this.updateShop(); saveGame(s); },
  toggleTowerMode(){ const s=this.s, tw=towerAt(s,+this.panelFor.slice(2)); if(!tw)return; tw.mode=(tw.mode==='folgen')?'wache':'folgen'; SFX.buy(); this.updateShop(); saveGame(s); },
  assign(d){ const s=this.s,b=s.builds[this.panelFor]; if(!b)return;
    if(d>0){ if(b.workers>=buildMaxWorkers(s)){ say('Hütte voll für diese Stufe — erst aufsteigen.'); return; }
      if(freeWorkers(s)<=0){ say('Keine freien Helfer — heuere in der Burg welche an.'); return; } b.workers++; }
    else { if(b.workers<=0) return; b.workers--; }
    SFX.buy(); this.updateShop(); saveGame(s); },
};

// world sprite: zeichnet ein fertiges Tiny-Swords-Sprite (A[key]), aspekt-korrekt; anchorBottom = Füsse auf (x,y)
function worldSprite(key,x,y,size,anchorBottom){ const im=A[key];
  if(!im||!im.complete||!im.naturalWidth) return;
  size*=SC; const asp=im.naturalWidth/im.naturalHeight; let w=size,h=size; if(asp>1)h=size/asp; else w=size*asp;
  const dy=anchorBottom? y-h : y-h/2;  // anchorBottom: Sprite steht mit den Füßen auf (x,y)
  ctx.drawImage(im,x-w/2,dy,w,h); }
function shadow(x,y,rx,ry){ ctx.fillStyle='rgba(0,0,0,.24)'; ctx.beginPath(); ctx.ellipse(x,y,rx*SC,ry*SC,0,0,7); ctx.fill(); }
function label(t,x,y){ ctx.save(); ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillText(t,x+1,y+1); ctx.fillStyle='rgba(236,231,255,.92)'; ctx.fillText(t,x,y); ctx.restore(); }
function amountBar(n){ const w=34*VS, frac=Math.max(0,n.amount/n.max), x=n.x, y=n.y-36*VS, h=5*VS, rd=2.5*VS;
  ctx.fillStyle='rgba(0,0,0,.5)'; rr(x-w/2,y,w,h,rd); ctx.fill(); ctx.fillStyle=COL[n.type]; rr(x-w/2,y,w*frac,h,rd); ctx.fill(); }
function pop(p){ const f=p.age/p.max; ctx.save(); ctx.globalAlpha=1-f;
  if(p.text){ ctx.fillStyle=p.color; ctx.font='bold 26px sans-serif'; ctx.textAlign='center'; ctx.fillText(p.text,p.x,p.y-38*f); }
  else { ctx.strokeStyle=p.color; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(p.x,p.y,12+f*38,0,7); ctx.stroke(); } ctx.restore(); }
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function edgeArrow(key,wx,wy,offx,offy,VW,VH,z,color){ let sx=wx*z+offx, sy=wy*z+offy; const m=34;
  if(sx>=m&&sx<=VW-m&&sy>=m&&sy<=VH-m) return;
  const cx=VW/2, cy=VH/2, ang=Math.atan2(sy-cy,sx-cx);
  const px=Math.max(m,Math.min(VW-m,sx)), py=Math.max(m,Math.min(VH-m,sy));
  ctx.save(); ctx.translate(px,py); ctx.rotate(ang); ctx.fillStyle=color; ctx.beginPath();
  ctx.moveTo(16,0); ctx.lineTo(-9,-10); ctx.lineTo(-9,10); ctx.closePath(); ctx.fill(); ctx.restore();
  worldSprite(key,px,py,22); }

let sayT=null;
function say(msg){ const el=document.getElementById('say'); el.style.opacity=0;
  setTimeout(()=>{ el.innerHTML='<b>'+GUIDE+':</b> '+msg; el.style.opacity=1; },120);
  if(sayT)clearTimeout(sayT); sayT=setTimeout(()=>{ el.style.opacity=0; },6000); }
function worldFromEvent(e){ const r=cv.getBoundingClientRect(), z=game.zoom;
  const cx=(e.touches?e.touches[0].clientX:e.clientX), cy=(e.touches?e.touches[0].clientY:e.clientY);
  return { x:(cx-r.left-game.vw/2)/z+game.s.cam.x, y:(cy-r.top-game.vh/2)/z+game.s.cam.y }; }
function moveTo(p){ game.s.player.tx=Math.max(10,Math.min(WORLD-10,p.x)); game.s.player.ty=Math.max(10,Math.min(WORLD-10,p.y));
  game.camFollow=true; }  // Held wird wohin geschickt → Kamera zieht wieder mit (matcht zurück)
// Eingabe: kurzer Tap = laufen (oder Shop am Gebäude); Halten+Ziehen = Kamera schwenken (umschauen)
let pDown=null, pLast=null;
const pointers=new Map(); let pinched=false, pinchPrev=0;   // Multi-Touch für Pinch-Zoom (mid:6301)
const clampZoom=z=>Math.max(0.06,Math.min(3.0,z));
cv.addEventListener('pointerdown',e=>{ e.preventDefault(); audioInit(); pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size>=2){ pinched=true; game.dragging=false; const p=[...pointers.values()]; pinchPrev=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); }
  else { pDown={x:e.clientX,y:e.clientY}; pLast={x:e.clientX,y:e.clientY}; game.dragging=false; } },{passive:false});
cv.addEventListener('pointermove',e=>{ if(!pointers.has(e.pointerId)) return; e.preventDefault(); pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size>=2){ const p=[...pointers.values()], nd=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);   // Pinch → Zoom
    if(pinchPrev>0) game.zoom=clampZoom(game.zoom*(nd/pinchPrev)); pinchPrev=nd; return; }
  if(pinched||!pDown||!(e.pressure>0||e.buttons)) return;   // nach Pinch kein versehentlicher Schwenk mit dem Restfinger
  const dx=e.clientX-pLast.x, dy=e.clientY-pLast.y; pLast={x:e.clientX,y:e.clientY};
  const wasDrag=game.dragging; if(Math.hypot(e.clientX-pDown.x,e.clientY-pDown.y)>10) game.dragging=true;
  if(game.dragging){
    if(!wasDrag){ game.camFollow=false; game.camGoal.x=game.s.cam.x; game.camGoal.y=game.s.cam.y; } // Schwenk startet bei der aktuellen Kamera
    game.camGoal.x=Math.max(0,Math.min(WORLD, game.camGoal.x-dx/game.zoom));
    game.camGoal.y=Math.max(0,Math.min(WORLD, game.camGoal.y-dy/game.zoom));
    game.s.cam.x=game.camGoal.x; game.s.cam.y=game.camGoal.y;  // 1:1 während des Ziehens (kein Smoothing-Lag)
  } },{passive:false});
cv.addEventListener('wheel',e=>{ e.preventDefault(); game.zoom=clampZoom(game.zoom*(e.deltaY<0?1.12:1/1.12)); },{passive:false});   // Desktop-Zoom per Mausrad (mid:6301)
function endPointer(){ if(!pDown) return;
  if(!game.dragging){ const p=worldFromEvent({clientX:pDown.x,clientY:pDown.y}), s=game.s, panel=document.getElementById('panel');
    const heroInVillage=dist(s.player.x,s.player.y,BASE.x,BASE.y)<OUTER_R+10;
    // Hütte angetippt? (nur wenn Held im Dorf ist) → Hütten-Panel
    let hutIdx=-1, hutD=70;
    if(heroInVillage&&s.segSlots) for(let i=0;i<s.builds.length;i++){ const sl=s.segSlots[s.builds[i].seg]; if(!sl)continue; const d=dist(p.x,p.y,sl.x,sl.y); if(d<hutD){ hutD=d; hutIdx=i; } }
    // Außenposten angetippt (nur wenn der Held nah dran ist) → Außenposten-Panel (mid:6246)
    let opIdx=-1, opD=46;   // ENGE Hitbox auf dem Gebäude-Körper (mid:6276): nah vorbeilaufen ohne Menü; Tap aufs Gebäude öffnet Panel (unabhängig von Held-Position, mid:6261)
    if(s.outposts) for(let i=0;i<s.outposts.length;i++){ const o=s.outposts[i], d=dist(p.x,p.y,o.x,o.y-31); if(d<opD){ opD=d; opIdx=i; } }   // -31 = Gebäude-Mitte (Sprite ist fußverankert)
    // Turm-Slot angetippt? (im äußeren Ring) → Turm-Panel (gebaut) / Bau-Menü (frei, wenn Waffenkammer steht) (mid:6357)
    let tsIdx=-1, tsD=58;
    if(s.towerSlots) for(let i=0;i<s.towerSlots.length;i++){ const ts=s.towerSlots[i], d=dist(p.x,p.y,ts.x,ts.y-12); if(d<tsD && (towerAt(s,i)||towersUnlocked(s))){ tsD=d; tsIdx=i; } }
    const tappedBase=dist(p.x,p.y,BASE.x,BASE.y)<BASE_SOLID+85;
    if(opIdx>=0){ game.openPanelFor('op'+opIdx); }
    else if(tsIdx>=0){ game.openPanelFor((towerAt(s,tsIdx)?'tw':'tb')+tsIdx); }
    else if(hutIdx>=0){ game.openPanelFor(hutIdx); }
    else if(tappedBase&&heroInVillage){ if(panel.classList.contains('open')&&game.panelFor==='castle') panel.classList.remove('open'); else game.openPanelFor('castle'); }
    else moveTo(p); }
  pDown=null; game.dragging=false; }
function upPointer(e){ pointers.delete(e.pointerId);
  if(pointers.size===0){ if(!pinched) endPointer(); else { pDown=null; game.dragging=false; } pinched=false; pinchPrev=0; } }   // Tap/Schwenk nur wenn in dieser Geste nicht gepincht wurde
cv.addEventListener('pointerup',e=>{ e.preventDefault(); upPointer(e); },{passive:false});
cv.addEventListener('pointercancel',e=>{ upPointer(e); },{passive:false});

game.init();
</script>
